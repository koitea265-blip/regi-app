<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算数セルフレジ</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html5-qrcode for barcode scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* レシート風のギザギザボーダー */
        .receipt-edge {
            background-image: radial-gradient(circle at 10px 0, transparent 10px, #ffffff 11px);
            background-size: 20px 20px;
            background-repeat: repeat-x;
            height: 20px;
            width: 100%;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- ヘッダー -->
    <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center shrink-0">
        <h1 class="text-2xl font-bold tracking-wider"><i class="fa-solid fa-cash-register mr-2"></i> 算数セルフレジ</h1>
        <div class="text-sm bg-blue-700 px-3 py-1 rounded-full"><i class="fa-solid fa-graduation-cap mr-1"></i> おつりけいさんモード</div>
    </header>

    <!-- メインコンテンツ (左右分割) -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden p-4 gap-4">
        
        <!-- 左側：バーコードリーダー領域 -->
        <section class="w-full md:w-1/2 flex flex-col bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="bg-slate-100 p-3 border-b border-slate-200 text-center font-bold text-slate-700">
                <i class="fa-solid fa-barcode mr-1"></i> バーコードをよみとってね
            </div>
            <div class="flex-1 flex flex-col items-center justify-center p-4 relative">
                <!-- カメラスキャン領域 -->
                <div id="reader" class="w-full max-w-sm rounded-lg overflow-hidden border-4 border-dashed border-blue-300"></div>
                <div id="scan-status" class="mt-4 text-sm text-slate-500">カメラの許可が必要です</div>
                
                <!-- テスト用ボタン (カメラが使えない環境用) -->
                <div class="mt-auto w-full pt-4 border-t border-slate-100 flex flex-col gap-2">
                    <p class="text-xs text-center text-slate-400">※カメラが動かないときのテスト用</p>
                    <button onclick="addRandomProduct()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center">
                        <i class="fa-solid fa-plus-circle text-blue-500 mr-2 text-lg"></i> ピッ！(商品をいれる)
                    </button>
                </div>
            </div>
        </section>

        <!-- 右側：レジ画面 -->
        <section class="w-full md:w-1/2 flex flex-col">
            <div class="flex-1 bg-white shadow-lg border border-slate-200 flex flex-col relative" style="border-radius: 12px 12px 0 0;">
                <div class="bg-slate-800 text-white p-3 text-center font-bold text-lg rounded-t-xl tracking-widest">
                    おかいあげリスト
                </div>
                
                <!-- 商品リスト -->
                <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                    <!-- 商品アイテムがここに追加される -->
                    <div class="text-center text-slate-400 mt-10" id="empty-message">
                        <i class="fa-solid fa-basket-shopping text-4xl mb-2 opacity-50"></i><br>
                        まだ なにも ないよ
                    </div>
                </div>

                <!-- 合計金額エリア -->
                <div class="p-4 bg-slate-50 border-t-2 border-dashed border-slate-300">
                    <div class="flex justify-between items-end">
                        <span class="text-xl font-bold text-slate-600">ごうけい</span>
                        <div class="text-right">
                            <span class="text-sm text-slate-500 mr-1">¥</span>
                            <span id="total-price" class="text-4xl font-black text-slate-800">0</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- レシートのギザギザ装飾 -->
            <div class="receipt-edge rotate-180 transform -mt-1 shadow-sm"></div>

            <!-- お支払いボタン -->
            <button id="pay-btn" onclick="startPayment()" disabled class="mt-4 w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 disabled:from-slate-300 disabled:to-slate-400 disabled:cursor-not-allowed text-white font-black text-2xl py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-coins"></i> おかいけいする
            </button>
        </section>
    </main>

    <!-- お釣り計算モーダル -->
    <div id="math-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-full">
            
            <div class="bg-yellow-400 p-4 text-center">
                <h2 class="text-2xl font-black text-yellow-900"><i class="fa-solid fa-pencil"></i> おつりを けいさんしよう！</h2>
            </div>
            
            <div class="p-6 flex-1 overflow-y-auto">
                <p id="question-text" class="text-center text-lg font-bold text-slate-700 mb-6 bg-slate-100 p-3 rounded-lg"></p>
                
                <!-- ひっ算表示エリア -->
                <div class="bg-slate-50 rounded-2xl p-6 border-2 border-slate-200 mb-6 flex justify-center">
                    <div class="font-mono text-5xl font-black text-slate-800 text-right leading-relaxed tracking-widest relative">
                        <!-- 支払額 -->
                        <div id="calc-payment" class="pl-8">1000</div>
                        <!-- 合計額 (マイナス) -->
                        <div class="border-b-4 border-slate-800 pb-2 flex justify-end relative">
                            <span class="absolute left-0">-</span>
                            <span id="calc-total">850</span>
                        </div>
                        <!-- 答え入力欄 -->
                        <div class="pt-2 text-blue-600 min-h-[4rem] flex justify-end">
                            <span id="calc-answer" class="border-b-4 border-blue-300 min-w-[3ch] inline-block text-center bg-blue-50"></span>
                        </div>
                        
                        <!-- 正解スタンプ (隠し) -->
                        <div id="correct-stamp" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 -rotate-12 scale-0 transition-transform duration-500 opacity-0 pointer-events-none z-10">
                            <div class="border-4 border-red-500 text-red-500 font-black text-6xl p-4 rounded-full bg-white/90 shadow-lg">
                                大正解!
                            </div>
                        </div>
                    </div>
                </div>

                <!-- テンキー -->
                <div class="grid grid-cols-3 gap-3 max-w-xs mx-auto">
                    <!-- 数字ボタン -->
                    <button onclick="inputNumber(7)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">7</button>
                    <button onclick="inputNumber(8)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">8</button>
                    <button onclick="inputNumber(9)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">9</button>
                    <button onclick="inputNumber(4)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">4</button>
                    <button onclick="inputNumber(5)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">5</button>
                    <button onclick="inputNumber(6)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">6</button>
                    <button onclick="inputNumber(1)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">1</button>
                    <button onclick="inputNumber(2)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">2</button>
                    <button onclick="inputNumber(3)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">3</button>
                    <!-- 操作ボタン -->
                    <button onclick="clearInput()" class="bg-red-100 hover:bg-red-200 text-red-600 font-bold py-4 rounded-xl shadow-sm border border-red-200 transition-colors text-lg flex items-center justify-center gap-1">
                        <i class="fa-solid fa-delete-left"></i> けす
                    </button>
                    <button onclick="inputNumber(0)" class="numpad-btn bg-slate-100 hover:bg-slate-200 text-3xl font-bold py-4 rounded-xl shadow-sm border border-slate-200 transition-colors">0</button>
                    <button onclick="checkAnswer()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-sm transition-colors text-xl">
                        けってい
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 underline text-sm">やめる (レジにもどる)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 状態管理
        // ==========================================
        let cart = [];
        let html5QrcodeScanner;
        
        // 算数用状態
        let currentTotal = 0;
        let currentPayment = 0;
        let correctAnswer = 0;
        let currentInput = "";
        let audioContextStarted = false;

        // ダミー商品マスター (実際のバーコードスキャン用)
        const productMaster = {
            "4901330502881": { name: "ポテトチップス", price: 150, icon: "fa-cookie" },
            "4902102072618": { name: "コーラ", price: 160, icon: "fa-bottle-water" },
            "4987176035820": { name: "せんざい", price: 450, icon: "fa-pump-soap" }
        };

        const randomItems = [
            { name: "リンゴ", price: 120, icon: "fa-apple-whole" },
            { name: "バナナ", price: 200, icon: "fa-lemon" },
            { name: "牛乳", price: 250, icon: "fa-cow" },
            { name: "パン", price: 180, icon: "fa-bread-slice" },
            { name: "おかし", price: 100, icon: "fa-candy-cane" },
            { name: "アイス", price: 150, icon: "fa-ice-cream" }
        ];

        // ==========================================
        // 初期化処理
        // ==========================================
        window.onload = function() {
            try {
                initScanner();
            } catch (e) {
                console.error("スキャナーの初期化に失敗しました", e);
                document.getElementById('scan-status').innerText = "カメラの起動に失敗しました。テストボタンを使ってください。";
            }
        };

        function initScanner() {
            // html5-qrcode の設定
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
                /* verbose= */ false
            );
            
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        let lastScanTime = 0;
        function onScanSuccess(decodedText, decodedResult) {
            try {
                // 連続スキャン防止 (2秒間隔)
                const now = Date.now();
                if (now - lastScanTime < 2000) return;
                lastScanTime = now;

                // スキャン音
                playBeep();

                // 商品特定
                let product = productMaster[decodedText];
                if (!product) {
                    // マスターにない場合はランダムな価格の商品として扱う
                    const randomPrice = Math.floor(Math.random() * 8 + 2) * 50; // 100〜500
                    product = { name: `なぞの商品(${decodedText.slice(-3)})`, price: randomPrice, icon: "fa-box-open" };
                }

                addToCart(product);
            } catch(e) {
                console.error('スキャン処理エラー:', e);
            }
        }

        function onScanFailure(error) {
            // スキャン失敗は頻繁に発生するためログ出力しない
        }

        // テスト用：ランダムな商品を追加
        function addRandomProduct() {
            playBeep();
            const item = randomItems[Math.floor(Math.random() * randomItems.length)];
            addToCart(item);
        }

        function addToCart(product) {
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            const listEl = document.getElementById('cart-list');
            const emptyEl = document.getElementById('empty-message');
            const totalEl = document.getElementById('total-price');
            const payBtn = document.getElementById('pay-btn');

            if (cart.length === 0) {
                listEl.innerHTML = '';
                listEl.appendChild(emptyEl);
                emptyEl.style.display = 'block';
                totalEl.innerText = '0';
                payBtn.disabled = true;
                currentTotal = 0;
                return;
            }

            emptyEl.style.display = 'none';
            listEl.innerHTML = '';
            
            let total = 0;
            
            // カート内を降順（新しいものが上）で表示
            [...cart].reverse().forEach((item, index) => {
                total += item.price;
                const itemEl = document.createElement('div');
                itemEl.className = 'flex justify-between items-center p-3 bg-white border border-slate-100 rounded-lg shadow-sm animate-[fadeIn_0.3s_ease-out]';
                itemEl.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-100 text-blue-600 w-10 h-10 rounded-full flex items-center justify-center">
                            <i class="fa-solid ${item.icon || 'fa-box'}"></i>
                        </div>
                        <span class="font-bold text-slate-700">${item.name}</span>
                    </div>
                    <div class="font-bold text-lg text-slate-800">
                        <span class="text-sm text-slate-400 font-normal">¥</span>${item.price}
                    </div>
                `;
                listEl.appendChild(itemEl);
            });

            currentTotal = total;
            totalEl.innerText = total.toLocaleString();
            payBtn.disabled = false;
        }

        // お支払い開始（モーダル表示）
        async function startPayment() {
            try {
                // Tone.jsのAudioContextをユーザーアクション時に開始
                if (!audioContextStarted) {
                    await Tone.start();
                    audioContextStarted = true;
                }

                if (currentTotal === 0) return;

                // 支払額を決定するロジック（キリの良い数字）
                currentPayment = calculatePaymentAmount(currentTotal);
                correctAnswer = currentPayment - currentTotal;
                currentInput = "";

                // UI更新
                document.getElementById('question-text').innerText = `${currentTotal}えん の おかいものです。\n${currentPayment}えん だしました。おつりは いくら？`;
                document.getElementById('calc-payment').innerText = currentPayment;
                document.getElementById('calc-total').innerText = currentTotal;
                updateInputDisplay();
                
                // スタンプリセット
                const stamp = document.getElementById('correct-stamp');
                stamp.classList.remove('scale-100', 'opacity-100');
                stamp.classList.add('scale-0', 'opacity-0');

                // モーダル表示
                document.getElementById('math-modal').classList.remove('hidden');
                document.getElementById('math-modal').classList.add('flex');
            } catch (e) {
                console.error("支払い処理エラー", e);
            }
        }

        // 支払額（出すお金）を計算する
        function calculatePaymentAmount(total) {
            if (total < 500) return 500;
            if (total < 1000) return 1000;
            if (total < 5000) return Math.ceil(total / 1000) * 1000; // 1200->2000
            if (total < 10000) return 10000;
            return Math.ceil(total / 10000) * 10000;
        }

        function closeModal() {
            document.getElementById('math-modal').classList.add('hidden');
            document.getElementById('math-modal').classList.remove('flex');
        }

        // テンキー入力処理
        function inputNumber(num) {
            // 最大5桁まで
            if (currentInput.length >= 5) return;
            // 先頭の0は許可しない(0単体ならOK)
            if (currentInput === "0") currentInput = "";
            
            currentInput += num.toString();
            updateInputDisplay();
            playClickSound();
        }

        function clearInput() {
            currentInput = "";
            updateInputDisplay();
            playClickSound();
        }

        function updateInputDisplay() {
            const display = document.getElementById('calc-answer');
            if (currentInput === "") {
                display.innerHTML = "&nbsp;"; // 空白を維持
                display.classList.remove('text-slate-800');
            } else {
                display.innerText = currentInput;
                display.classList.add('text-slate-800');
            }
        }

        // 答え合わせ
        function checkAnswer() {
            if (currentInput === "") return;
            
            const answer = parseInt(currentInput, 10);
            
            if (answer === correctAnswer) {
                // 正解
                playCorrectSound();
                showCorrectStamp();
                
                // 3秒後にリセットして閉じる
                setTimeout(() => {
                    closeModal();
                    // レジをリセット
                    cart = [];
                    updateCartUI();
                }, 3000);
            } else {
                // 不正解
                playWrongSound();
                
                // 画面を揺らすアニメーション
                const calcArea = document.getElementById('calc-answer');
                calcArea.classList.add('animate-ping');
                setTimeout(() => {
                    calcArea.classList.remove('animate-ping');
                    currentInput = "";
                    updateInputDisplay();
                }, 500);
            }
        }

        function showCorrectStamp() {
            const stamp = document.getElementById('correct-stamp');
            stamp.classList.remove('scale-0', 'opacity-0');
            stamp.classList.add('scale-100', 'opacity-100');
        }

        // ==========================================
        // 音声合成 (Tone.js)
        // ==========================================
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        // 音量を少し下げる
        synth.volume.value = -5; 

        function playBeep() {
            if(!audioContextStarted) return;
            try {
                synth.triggerAttackRelease("C6", "16n");
            } catch(e){}
        }

        function playClickSound() {
            if(!audioContextStarted) return;
            try {
                synth.triggerAttackRelease("G5", "32n");
            } catch(e){}
        }

        function playCorrectSound() {
            if(!audioContextStarted) return;
            try {
                const now = Tone.now();
                // ピン・ポン（高・低）
                synth.triggerAttackRelease("E6", "8n", now);
                synth.triggerAttackRelease("C6", "4n", now + 0.15);
            } catch(e){}
        }

        function playWrongSound() {
            if(!audioContextStarted) return;
            try {
                const now = Tone.now();
                // ブブー
                synth.triggerAttackRelease("C4", "16n", now);
                synth.triggerAttackRelease("C4", "16n", now + 0.15);
            } catch(e){}
        }

        // Tailwind カスタムアニメーション追加
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
