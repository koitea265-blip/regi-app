<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算数セルフレジ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html5-qrcode (バーコード読み取りライブラリ) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <!-- Tone.js (効果音用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f0fdf4; }
        
        /* 教科書体フォントの優先指定 */
        .math-font-kyokasho {
            font-family: "UD Digi Kyokasho NK-R", "UD Digi Kyokasho", "UD デジタル教科書体", "YuKyo-Medium", "YuKyo", "游教科書体", "Sawarabi Mincho", "Noto Serif JP", serif;
        }

        /* カメラ映像の左右反転（鏡表示）用 */
        .mirror-video video {
            transform: scaleX(-1);
        }

        /* 5列×6行のリアル方眼紙グリッド（各行の高さを個別に調節） */
        .math-grid-cell {
            border-right: 1px solid #bae6fd;
            border-bottom: 1px solid #bae6fd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem;
            font-weight: 700;
            color: #1f2937;
            position: relative;
        }

        /* スキャン時の赤いレーザー光のアニメーション */
        @keyframes laser-sweep {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .laser-line {
            animation: laser-sweep 2s infinite linear;
        }

        /* 成功時のスタンプアニメーション */
        @keyframes stamp {
            0% { transform: scale(5) rotate(-20deg); opacity: 0; }
            50% { transform: scale(0.8) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }
        .stamp-animation { animation: stamp 0.5s ease-out forwards; color: #ef4444; border: 8px solid #ef4444; }
    </style>
</head>
<body class="h-screen flex flex-col select-none">

    <header class="bg-emerald-600 text-white p-4 shadow-md flex justify-between items-center z-10 flex-shrink-0">
        <h1 class="text-2xl font-bold flex items-center gap-2">🛒 算数セルフレジ</h1>
        <span class="bg-emerald-800 text-xs px-3 py-1.5 rounded-full font-bold">たのしいお買い物＆ひっ算おつり計算</span>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 overflow-hidden min-h-0">
        
        <!-- 左側：カメラバーコードリーダー ＆ 模擬スキャン -->
        <section class="flex-[1.4] flex flex-col gap-4 min-h-0">
            
            <!-- スキャナー（カメラ）ゾーン -->
            <div class="bg-gray-900 rounded-xl p-4 flex flex-col items-center justify-center relative border-4 border-gray-800 shadow-inner h-[280px] sm:h-[350px] flex-shrink-0">
                <span class="absolute top-2 left-3 text-xs text-gray-500 font-bold uppercase tracking-widest">バーコードスキャナー</span>
                
                <!-- カメラ切り替えボタン -->
                <button id="camera-toggle-btn" onclick="toggleCamera()" class="absolute top-2 right-3 bg-gray-700 hover:bg-gray-600 text-white text-xs py-1 px-3 rounded-md transition z-30 hidden">
                    📷 カメラ反転
                </button>

                <!-- スキャンライン（ビカッと光るレーザー） -->
                <div class="absolute left-0 w-full h-1 bg-red-500 shadow-[0_0_12px_#ef4444] laser-line pointer-events-none z-10"></div>
                
                <!-- カメラ映像表示部 -->
                <div id="reader" class="w-full h-full max-w-md rounded-lg overflow-hidden mirror-video bg-black flex items-center justify-center">
                    <!-- カメラが使えない場合のフォールバック案内 -->
                    <div id="camera-fallback" class="text-center p-4">
                        <p class="text-gray-400 text-sm mb-3">カメラのじゅんびをしています...</p>
                    </div>
                </div>
            </div>

            <!-- 操作・テスト用ボード -->
            <div class="flex-shrink-0 bg-white rounded-xl shadow p-4 border border-emerald-100 flex gap-2 justify-between items-center">
                <div class="text-xs text-gray-500 font-semibold">
                    💡 おうちのバーコードをかざしてね！何にでも「ピッ！」と登録されるよ！
                </div>
                <!-- 開発用・カメラがない時のテスト用ボタン -->
                <button onclick="simulateScan()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-lg shadow text-xs transition active:scale-95 flex-shrink-0">
                    ピッ！(テスト用ボタン)
                </button>
            </div>

            <!-- 最近スキャンした商品表示 -->
            <div class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4 min-h-0 border border-emerald-100 justify-center items-center">
                <div class="text-center">
                    <div id="scanner-view-emoji" class="text-7xl mb-2">🏪</div>
                    <div id="scanner-view-name" class="text-lg font-bold text-gray-400">バーコードをかざしてね！</div>
                </div>
            </div>
        </section>

        <!-- 右側：おかいあげカート -->
        <section class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4 min-h-0 border border-emerald-100">
            <h2 class="text-xl font-bold mb-3 text-gray-700 border-b-2 border-gray-100 pb-2 flex items-center gap-1.5">
                <span>📋</span> おかいあげ商品
            </h2>
            
            <ul id="cart-list" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-1">
                <li class="text-gray-400 text-center mt-16">おかいもの を はじめよう！</li>
            </ul>

            <div class="border-t-4 border-gray-800 pt-4 bg-white flex-shrink-0">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-xl font-bold text-gray-700">ごうけい</span>
                    <span class="text-4xl font-black text-red-600">¥<span id="total-price">0</span></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="clearCart()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl shadow transition active:scale-95 text-sm">
                        やりなおす
                    </button>
                    <button onclick="startCheckout()" id="checkout-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-lg py-3 rounded-xl shadow-lg transform transition active:scale-95 disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
                        おかいけいする 💳
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- 算数おつり計算モーダル -->
    <div id="math-modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex justify-center items-center z-50 p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col my-auto max-h-[90vh]">
            
            <!-- モーダルヘッダー -->
            <div class="bg-emerald-600 text-white p-4 text-center flex-shrink-0">
                <h3 class="text-2xl font-bold">おつりを けいさん しよう！</h3>
                <p id="payment-text" class="text-base mt-1 bg-emerald-700 py-1.5 px-4 rounded-full inline-block font-medium"></p>
            </div>
            
            <!-- 左右2分割コンテンツエリア -->
            <div class="flex-1 flex flex-col md:flex-row bg-sky-50 overflow-y-auto p-4 md:p-6 gap-6 min-h-0">
                
                <!-- 左側：筆算とお絵描きキャンバス -->
                <div class="flex-1 flex flex-col items-center flex-shrink-0">
                    
                    <!-- ペンツールバー -->
                    <div class="w-full max-w-[320px] flex justify-between items-center mb-3 bg-white p-2 rounded-lg shadow-sm border border-sky-100">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-gray-500">✏️ メモペン:</span>
                            <button onclick="changePenColor('#ef4444')" id="btn-pen-red" class="w-6 h-6 rounded-full bg-red-500 border-2 border-white shadow ring-2 ring-red-500"></button>
                            <button onclick="changePenColor('#3b82f6')" id="btn-pen-blue" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white shadow"></button>
                            <button onclick="changePenColor('#1f2937')" id="btn-pen-black" class="w-6 h-6 rounded-full bg-gray-800 border-2 border-white shadow"></button>
                        </div>
                        <button onclick="clearCanvas()" class="text-xs bg-orange-100 text-orange-700 font-bold py-1 px-3 rounded hover:bg-orange-200 transition">
                            🧹 メモを消す
                        </button>
                    </div>

                    <!-- 筆算方眼ボード -->
                    <div class="relative w-[320px] h-[450px] bg-sky-50/50 rounded-xl border-4 border-sky-400 shadow-lg overflow-hidden select-none bg-white">
                        
                        <!-- 5列×6行のリアル方眼紙グリッド -->
                        <!-- 1行目：くり下がり手書きメモ用に高さを1.6倍に設定 -->
                        <div class="absolute inset-0 grid math-font-kyokasho" id="math-grid-container" style="grid-template-columns: repeat(5, 1fr); grid-template-rows: 1.6fr 1fr 1fr 8px 1fr 1.2fr;">
                            
                            <!-- 1行目: くり下がり用空きマス（手書き用に完全に空、1.6倍の縦長） -->
                            <div class="math-grid-cell bg-slate-50/50"></div>
                            <div class="math-grid-cell bg-slate-50/50"></div>
                            <div class="math-grid-cell bg-slate-50/50"></div>
                            <div class="math-grid-cell bg-slate-50/50"></div>
                            <div class="math-grid-cell bg-slate-50/50"></div>

                            <!-- 2行目: 引かれる数 (1000等) -->
                            <div class="math-grid-cell text-gray-300 font-normal opacity-10"></div>
                            <div id="cell-p3" class="math-grid-cell"></div>
                            <div id="cell-p2" class="math-grid-cell"></div>
                            <div id="cell-p1" class="math-grid-cell"></div>
                            <div id="cell-p0" class="math-grid-cell"></div>

                            <!-- 3行目: 引く数 (- 850等) -->
                            <!-- マイナス記号を巨大化 -->
                            <div class="math-grid-cell text-blue-600 font-black text-5xl">－</div>
                            <div id="cell-t3" class="math-grid-cell"></div>
                            <div id="cell-t2" class="math-grid-cell"></div>
                            <div id="cell-t1" class="math-grid-cell"></div>
                            <div id="cell-t0" class="math-grid-cell"></div>

                            <!-- 4行目: 太い横線 -->
                            <div class="col-span-5 h-[8px] bg-gray-800"></div>

                            <!-- 5行目: 横線下の手書きメモ用の空行 (おつりメモに最適) -->
                            <div class="math-grid-cell bg-slate-50/30"></div>
                            <div class="math-grid-cell bg-slate-50/30"></div>
                            <div class="math-grid-cell bg-slate-50/30"></div>
                            <div class="math-grid-cell bg-slate-50/30"></div>
                            <div class="math-grid-cell bg-slate-50/30"></div>

                            <!-- 6行目: 答え入力マス (タップするとフォーカスが当たります) -->
                            <div class="math-grid-cell text-gray-400 opacity-50 font-normal text-3xl">=</div>
                            
                            <!-- 千の位 -->
                            <div onclick="setFocusDigit(3)" id="input-box-3" class="math-grid-cell cursor-pointer bg-white transition hover:bg-yellow-50">
                                <span id="ans-val-3" class="text-emerald-600 font-black text-4.5xl"></span>
                            </div>
                            <!-- 百の位 -->
                            <div onclick="setFocusDigit(2)" id="input-box-2" class="math-grid-cell cursor-pointer bg-white transition hover:bg-yellow-50">
                                <span id="ans-val-2" class="text-emerald-600 font-black text-4.5xl"></span>
                            </div>
                            <!-- 十の位 -->
                            <div onclick="setFocusDigit(1)" id="input-box-1" class="math-grid-cell cursor-pointer bg-white transition hover:bg-yellow-50">
                                <span id="ans-val-1" class="text-emerald-600 font-black text-4.5xl"></span>
                            </div>
                            <!-- 一の位 -->
                            <div onclick="setFocusDigit(0)" id="input-box-0" class="math-grid-cell cursor-pointer bg-white transition hover:bg-yellow-50">
                                <span id="ans-val-0" class="text-emerald-600 font-black text-4.5xl"></span>
                            </div>
                        </div>

                        <!-- 手書き用のCanvas (1行目〜5行目部分に完璧に重ねる：答え入力マスとは重ならないように grid-row: 1/6 に設定) -->
                        <canvas id="memo-canvas" class="absolute inset-0 cursor-crosshair z-20 touch-none" style="grid-column: 1 / -1; grid-row: 1 / 6; width: 100%; height: 100%;"></canvas>
                    </div>

                    <p id="math-message" class="h-6 text-red-600 font-bold mt-3 text-center text-sm"></p>
                </div>

                <!-- 右側：10キーコントロールボード -->
                <div class="flex-1 flex flex-col justify-center max-w-[360px] mx-auto w-full flex-shrink-0">
                    <p class="text-center text-xs font-bold text-gray-500 mb-2">マスをタップしてから数字を押してね</p>
                    <div class="grid grid-cols-3 gap-2 bg-gray-100 p-3 rounded-2xl border border-gray-200 shadow-md">
                        <button onclick="pressKey(7)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">7</button>
                        <button onclick="pressKey(8)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">8</button>
                        <button onclick="pressKey(9)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">9</button>
                        <button onclick="pressKey(4)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">4</button>
                        <button onclick="pressKey(5)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">5</button>
                        <button onclick="pressKey(6)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">6</button>
                        <button onclick="pressKey(1)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">1</button>
                        <button onclick="pressKey(2)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">2</button>
                        <button onclick="pressKey(3)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">3</button>
                        <button onclick="deleteDigit()" class="bg-red-100 text-red-700 py-4 text-sm font-bold rounded-xl shadow active:bg-red-200 flex items-center justify-center">1字消す</button>
                        <button onclick="pressKey(0)" class="bg-white py-4 text-2xl font-bold rounded-xl shadow active:bg-gray-200">0</button>
                        <button onclick="validateMathAnswer()" class="bg-emerald-500 text-white py-4 text-sm font-bold rounded-xl shadow hover:bg-emerald-600 active:scale-95 transition">答え合せ</button>
                    </div>
                    
                    <button onclick="closeModal()" class="w-full mt-4 py-3 bg-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-400 transition">やりなおす</button>
                </div>

            </div>
        </div>
    </div>

    <!-- お祝い画面 -->
    <div id="success-overlay" class="fixed inset-0 bg-white bg-opacity-95 hidden flex flex-col justify-center items-center z-[60]">
        <div class="stamp-animation rounded-full w-72 h-72 flex items-center justify-center bg-white shadow-2xl">
            <span class="text-6xl font-black tracking-wider text-red-500">大正解!!</span>
        </div>
        <p class="text-xl font-bold text-gray-600 mt-6">おつりのけいさん、ばっちりだね！🎉</p>
        <button onclick="resetApp()" class="mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-full shadow-lg text-2xl active:scale-95 transform transition">
            つぎのお客さんをよぶ
        </button>
    </div>

    <script>
        // 豊富なダミー商品データベース（一の位が0以外の価格を多数導入！）
        const productDB = [
            { emoji: "🍎", name: "おいしいりんご", price: 124 },
            { emoji: "🍌", name: "完熟バナナ", price: 87 },
            { emoji: "🍓", name: "あまおういちご", price: 398 },
            { emoji: "🍈", name: "高級メロン", price: 683 },
            { emoji: "🍙", name: "さけおにぎり", price: 135 },
            { emoji: "🍙", name: "うめおにぎり", price: 112 },
            { emoji: "🍞", name: "こだわり食パン", price: 216 },
            { emoji: "🥐", name: "クロワッサン", price: 148 },
            { emoji: "🥪", name: "ミックスサンド", price: 279 },
            { emoji: "🥛", name: "おいしい牛乳", price: 173 },
            { emoji: "🍹", name: "100%みかんジュース", price: 121 },
            { emoji: "🍮", name: "なめらかプリン", price: 145 },
            { emoji: "🍫", name: "いたチョコ", price: 103 },
            { emoji: "🍪", name: "チョコチップクッキー", price: 232 },
            { emoji: "🍰", name: "いちごのショートケーキ", price: 415 },
            { emoji: "🍨", name: "バニラアイス", price: 156 },
            { emoji: "🚗", name: "スポーツカーミニカー", price: 478 },
            { emoji: "🤖", name: "ポケットロボット", price: 893 },
            { emoji: "🎨", name: "らくがきぬりえちょう", price: 254 },
            { emoji: "📓", name: "5mm方眼じゆうちょう", price: 128 },
            { emoji: "✏️", name: "かきかたえんぴつセット", price: 247 },
            { emoji: "🧼", name: "よく消える消しゴム", price: 82 },
            { emoji: "⚽", name: "カラフルサッカーボール", price: 981 },
            { emoji: "🧸", name: "ふわふわテディベア", price: 1245 },
            { emoji: "🍩", name: "いちごドーナツ", price: 138 },
            { emoji: "🍟", name: "フライドポテト", price: 223 },
            { emoji: "🍔", name: "チーズバーガー", price: 342 },
            { emoji: "🍕", name: "ピザスライス", price: 289 },
            { emoji: "🍦", name: "ソフトクリーム", price: 264 },
            { emoji: "🍡", name: "三色だんご", price: 94 },
            { emoji: "🧃", name: "アップルジュース", price: 88 },
            { emoji: "🍭", name: "ぐるぐるキャンディ", price: 115 },
            { emoji: "🍜", name: "カップラーメン", price: 184 },
            { emoji: "🍛", name: "甘口レトルトカレー", price: 159 },
            { emoji: "🍣", name: "たまごお寿司トイ", price: 498 },
            { emoji: "🦕", name: "きょうりゅうフィギュア", price: 734 },
            { emoji: "🎒", name: "ミニランドセルキーホルダー", price: 550 },
            { emoji: "🖍️", name: "おえかきクレヨン12色", price: 624 },
            { emoji: "✂️", name: "よく切れる工作はさみ", price: 312 },
            { emoji: "📏", name: "じょうぎセット", price: 198 },
            { emoji: "🎈", name: "ぷうせん詰め合わせ", price: 104 },
            { emoji: "🔋", name: "おもちゃ用かん電池", price: 298 },
            { emoji: "🧊", name: "ふしぎなスライム", price: 187 },
            { emoji: "🪁", name: "よくとぶカイト", price: 432 },
            { emoji: "🎯", name: "安全ダーツゲーム", price: 864 },
            { emoji: "🧩", name: "にほんちずパズル", price: 927 }
        ];

        let cart = [];
        let currentTotal = 0;
        let currentPayment = 0;
        let correctAnswer = 0;
        
        // 位ごと (0=一, 1=十, 2=百, 3=千) の入力値保持
        let digitValues = { 0: "", 1: "", 2: "", 3: "" };
        let activeFocusDigit = 0; // 初期フォーカスは「一の位」

        // 手書きメモ状態
        let canvas, ctx;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let penColor = '#ef4444'; // 初期は赤

        // 効果音用
        let beepSynth = null;
        let successSynth = null;
        let errorSynth = null;

        // カメラ（html5-qrcode）関連
        let html5QrCode = null;
        let cameraFacingMode = "user"; // デフォルト前面カメラ
        let isScanningActive = false;
        let lastScannedCode = "";
        let scanCooldown = false;

        window.onload = function() {
            updateCartUI();
            setupMemoCanvas();
            initScanner();
        };

        // バーコード文字列の簡易ハッシュから安定して同じ商品を決定するロジック
        function getProductFromBarcode(barcode) {
            let hash = 0;
            for (let i = 0; i < barcode.length; i++) {
                hash = barcode.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % productDB.length;
            return productDB[index];
        }

        // 実際にカメラバーコード読み取りを初期化する
        function initScanner() {
            const fallbackEl = document.getElementById('camera-fallback');
            
            // カメラが存在するか確認
            Html5Qrcode.getCameras().then(cameras => {
                if (cameras && cameras.length > 0) {
                    if (cameras.length > 1) {
                        document.getElementById('camera-toggle-btn').classList.remove('hidden');
                    }
                    startCamera();
                } else {
                    fallbackEl.innerHTML = '<p class="text-amber-500 font-bold text-sm">カメラが見つかりません。下の「テスト用ボタン」をご利用ください！</p>';
                }
            }).catch(err => {
                console.warn("Camera check failed:", err);
                fallbackEl.innerHTML = '<p class="text-amber-500 font-bold text-sm">カメラの起動に失敗しました。下の「テスト用ボタン」をご利用ください！</p>';
            });
        }

        function startCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    launchCameraInstance();
                }).catch(() => {
                    launchCameraInstance();
                });
            } else {
                launchCameraInstance();
            }
        }

        function launchCameraInstance() {
            html5QrCode = new Html5Qrcode("reader");
            const config = {
                fps: 15,
                qrbox: { width: 250, height: 150 }, // バーコードを読みやすい長方形サイズ
                aspectRatio: 1.333333
            };

            const targetMode = { facingMode: cameraFacingMode };

            html5QrCode.start(
                targetMode, 
                config,
                (decodedText, decodedResult) => {
                    // スキャン成功
                    onScanSuccess(decodedText);
                },
                (errorMessage) => {
                    // 低頻度のエラーメッセージ（未検知時）は無視
                }
            ).then(() => {
                isScanningActive = true;
                // インカメラ（user）の時だけ左右反転クラスを適用
                const readerDiv = document.getElementById('reader');
                if (cameraFacingMode === "user") {
                    readerDiv.classList.add('mirror-video');
                } else {
                    readerDiv.classList.remove('mirror-video');
                }
            }).catch(err => {
                console.error("Camera start error:", err);
                document.getElementById('camera-fallback').innerHTML = '<p class="text-amber-500 font-bold text-sm">カメラが使えない環境です。下のボタンで遊んでね！</p>';
            });
        }

        function toggleCamera() {
            cameraFacingMode = (cameraFacingMode === "user") ? "environment" : "user";
            startCamera();
        }

        // バーコードが読み取れた時のアクション
        function onScanSuccess(decodedText) {
            if (scanCooldown) return;
            scanCooldown = true;
            setTimeout(() => { scanCooldown = false; }, 2000); // 連続読み込みを避けるため2秒クールダウン

            // バーコード情報からユニークに商品を選択
            const product = getProductFromBarcode(decodedText);
            
            // 効果音
            playRealBeep();

            // 画面表示更新
            const viewEmoji = document.getElementById('scanner-view-emoji');
            const viewName = document.getElementById('scanner-view-name');
            viewEmoji.innerText = product.emoji;
            viewName.innerText = `${product.name} (¥${product.price})`;
            viewName.className = "text-xl font-bold text-emerald-700 animate-bounce";

            // カートへ追加
            cart.push(product);
            updateCartUI();
        }

        // テスト用・デバッグ用の手動スキャンシミュレータ
        function simulateScan() {
            // ランダムなダミーバーコード番号を生成して渡す
            const fakeBarcode = Math.floor(Math.random() * 1000000000000).toString();
            onScanSuccess(fakeBarcode);
        }

        function clearCart() {
            cart = [];
            updateCartUI();
            
            const viewEmoji = document.getElementById('scanner-view-emoji');
            const viewName = document.getElementById('scanner-view-name');
            viewEmoji.innerText = "🏪";
            viewName.innerText = "バーコードをかざしてね！";
            viewName.className = "text-lg font-bold text-gray-400";
        }

        function updateCartUI() {
            const listEl = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                listEl.innerHTML = '<li class="text-gray-400 text-center mt-16">おかいもの を はじめよう！</li>';
                totalEl.innerText = '0';
                checkoutBtn.disabled = true;
                return;
            }

            checkoutBtn.disabled = false;
            listEl.innerHTML = '';
            currentTotal = 0;

            cart.forEach((item) => {
                currentTotal += item.price;
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-150 shadow-sm";
                li.innerHTML = `
                    <span class="font-bold text-gray-700 text-base">${item.emoji} ${item.name}</span>
                    <span class="font-extrabold text-gray-900 text-lg">¥${item.price}</span>
                `;
                listEl.appendChild(li);
            });

            totalEl.innerText = currentTotal;
            listEl.scrollTop = listEl.scrollHeight;
        }

        // 手書きメモ用キャンバス制御
        function setupMemoCanvas() {
            canvas = document.getElementById('memo-canvas');
            ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }
            
            resizeCanvas();
            new ResizeObserver(resizeCanvas).observe(canvas);

            // マウス描画
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // タッチ描画
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                startDrawing({
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.preventDefault();
            });

            canvas.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                draw({
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', stopDrawing);
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.strokeStyle = penColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            lastX = currentX;
            lastY = currentY;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function changePenColor(color) {
            penColor = color;
            ['red', 'blue', 'black'].forEach(c => {
                const btn = document.getElementById(`btn-pen-${c}`);
                if (color.includes(c === 'red' ? 'ef' : c === 'blue' ? '3b' : '1f')) {
                    btn.classList.add('ring-2', 'ring-offset-1', 'ring-emerald-500');
                } else {
                    btn.classList.remove('ring-2', 'ring-offset-1', 'ring-emerald-500');
                }
            });
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ひっ算お会計開始
        function startCheckout() {
            if (currentTotal === 0) return;

            // 支払うお金の決定（100, 500, 1000, 5000, 10000円札を適切にチョイス）
            if (currentTotal <= 100) {
                currentPayment = 100;
            } else if (currentTotal <= 500) {
                currentPayment = 500;
            } else if (currentTotal <= 1000) {
                currentPayment = 1000;
            } else if (currentTotal <= 5000) {
                currentPayment = 5000;
            } else {
                currentPayment = 10000;
            }

            if (currentPayment === currentTotal) {
                currentPayment += 1000;
            }

            correctAnswer = currentPayment - currentTotal;
            digitValues = { 0: "", 1: "", 2: "", 3: "" };
            
            document.getElementById('payment-text').innerText = `ごうけい ${currentTotal}円。おさいふから ${currentPayment}円 だしました！`;
            
            // 筆算の支払額をマスにはめ込む
            const payStr = currentPayment.toString().padStart(4, ' ');
            document.getElementById('cell-p3').innerText = payStr[0] !== ' ' ? payStr[0] : '';
            document.getElementById('cell-p2').innerText = payStr[1] !== ' ' ? payStr[1] : '';
            document.getElementById('cell-p1').innerText = payStr[2] !== ' ' ? payStr[2] : '';
            document.getElementById('cell-p0').innerText = payStr[3] !== ' ' ? payStr[3] : '';

            // 筆算の購入額（合計額）をマスにはめ込む
            const totStr = currentTotal.toString().padStart(4, ' ');
            document.getElementById('cell-t3').innerText = totStr[0] !== ' ' ? totStr[0] : '';
            document.getElementById('cell-t2').innerText = totStr[1] !== ' ' ? totStr[1] : '';
            document.getElementById('cell-t1').innerText = totStr[2] !== ' ' ? totStr[2] : '';
            document.getElementById('cell-t0').innerText = totStr[3] !== ' ' ? totStr[3] : '';

            // 入力表示を初期化
            for (let i = 0; i < 4; i++) {
                document.getElementById(`ans-val-${i}`).innerText = "";
            }

            document.getElementById('math-message').innerText = "";
            clearCanvas();
            setFocusDigit(0); // 一の位からスタート

            document.getElementById('math-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('math-modal').classList.add('hidden');
        }

        // 位フォーカス調整
        function setFocusDigit(digitIndex) {
            activeFocusDigit = digitIndex;
            
            for (let i = 0; i < 4; i++) {
                const box = document.getElementById(`input-box-${i}`);
                if (i === digitIndex) {
                    box.className = "math-grid-cell cursor-pointer bg-yellow-100 border-4 border-yellow-400 ring-2 ring-yellow-400 z-10";
                } else {
                    box.className = "math-grid-cell cursor-pointer bg-white transition hover:bg-yellow-50";
                }
            }
        }

        // テンキー入力
        function pressKey(num) {
            digitValues[activeFocusDigit] = num.toString();
            document.getElementById(`ans-val-${activeFocusDigit}`).innerText = num;
            
            // 自動的に一桁上の位へ進む (一 -> 十 -> 百 -> 千)
            if (activeFocusDigit < 3) {
                setFocusDigit(activeFocusDigit + 1);
            }
            document.getElementById('math-message').innerText = "";
        }

        // 1文字消去
        function deleteDigit() {
            digitValues[activeFocusDigit] = "";
            document.getElementById(`ans-val-${activeFocusDigit}`).innerText = "";
            
            if (activeFocusDigit > 0) {
                setFocusDigit(activeFocusDigit - 1);
            }
            document.getElementById('math-message').innerText = "";
        }

        // 答え合わせ
        function validateMathAnswer() {
            let userStr = "";
            for (let i = 3; i >= 0; i--) {
                userStr += digitValues[i] !== "" ? digitValues[i] : "0";
            }
            const userNum = parseInt(userStr, 10);

            if (userNum === correctAnswer) {
                playSuccessSound();
                closeModal();
                document.getElementById('success-overlay').classList.remove('hidden');
            } else {
                playErrorSound();
                document.getElementById('math-message').innerText = "おつりがちがうみたい。もういちど けいさんしてみよう！";
            }
        }

        function resetApp() {
            cart = [];
            updateCartUI();
            document.getElementById('success-overlay').classList.add('hidden');
            
            // 表示の初期化
            const viewEmoji = document.getElementById('scanner-view-emoji');
            const viewName = document.getElementById('scanner-view-name');
            viewEmoji.innerText = "🏪";
            viewName.innerText = "バーコードをかざしてね！";
            viewName.className = "text-lg font-bold text-gray-400";
        }

        // 音響エンジンの初期化
        function initAudioEngine() {
            if (!beepSynth && typeof Tone !== 'undefined') {
                // 本物のレジに近い「ピッ！」（高速な立ち上がり）
                beepSynth = new Tone.Synth({
                    oscillator: { type: "sine" },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.05 }
                }).toDestination();
                beepSynth.volume.value = 5;

                successSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.01, decay: 0.15, sustain: 0.4, release: 0.15 }
                }).toDestination();

                errorSynth = new Tone.Synth({
                    oscillator: { type: "sawtooth" },
                    envelope: { attack: 0.02, decay: 0.3, sustain: 0, release: 0.1 }
                }).toDestination();
            }
        }

        async function playRealBeep() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initAudioEngine();
                beepSynth.triggerAttackRelease("G6", "0.03");
            } catch(e){}
        }

        async function playSuccessSound() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initAudioEngine();
                successSynth.triggerAttackRelease(["E5", "G5", "C6"], "0.25");
                setTimeout(() => {
                    successSynth.triggerAttackRelease(["G5", "C6", "E6"], "0.45");
                }, 150);
            } catch(e){}
        }

        async function playErrorSound() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initAudioEngine();
                errorSynth.triggerAttackRelease("G#3", "0.35");
            } catch(e){}
        }
    </script>
</body>
</html>
