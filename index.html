<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>セルフレジでおかいけいしよう</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Html5-Qrcode (カメラバーコードスキャン) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Tone.js (音響システム) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <!-- Google Fonts 丸ゴシック体 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* 基本UI：かわいい丸ゴシック系 */
        body, button, input, p, h1, h2, h3, h4, span {
            font-family: 'M PLUS Rounded 1c', "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
        }

        /* 筆算エリア・レシート：正確な教科書体を最優先で強制適用 */
        .font-kyokasho, #calculation-grid .graph-cell, [id^="ans-box-"] {
            font-family: "UD Digi Kyokasho NK-R", "UD デジタル教科書体 NK-R", "UD Digi Kyokasho NP-R", "UD デジタル教科書体 NP-R", "UD デジタル教科書体", "游教科書体", YuMincho, serif !important;
        }

        /* カメラの左右反転（鏡）かつ1.8倍デジタルズーム表示（デフォルト適用） */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            transform: scale(-1.8, 1.8) !important; /* 鏡 ＆ 1.8倍拡大 */
            transform-origin: center !important;
        }

        /* 背面カメラ切り替え時の向き補正（鏡なし ＆ 1.8倍ズーム） */
        .back-camera video {
            transform: scale(1.8, 1.8) !important; 
        }

        /* 方眼罫線 */
        .graph-cell {
            position: relative;
            border-right: 1px solid #bae6fd;
            border-bottom: 1px solid #bae6fd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-select { 
            -webkit-touch-callout: none; 
            user-select: none; 
        }

        /* フラットなリアルレシートのスタイル */
        .receipt-paper {
            position: relative; /* スタンプの配置基準点 */
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            border-top: 8px solid #10b981; /* 上部のエメラルドカラーの太線 */
        }
    </style>
</head>
<body class="h-screen flex flex-col select-none bg-slate-50 no-select">

    <header class="bg-emerald-600 text-white p-4 shadow-md flex justify-between items-center z-10 flex-shrink-0">
        <h1 class="text-2xl font-bold flex items-center gap-2">🛒 セルフレジでおかいけいしよう</h1>
        <span class="bg-emerald-800 text-xs px-3 py-1.5 rounded-full font-bold">たのしいお買い物＆ひっ算おつり計算</span>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 overflow-hidden min-h-0">
        
        <section class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4 border border-emerald-100 min-h-0">
            <h2 class="text-xl font-bold mb-2 text-gray-700 flex items-center gap-1.5">
                <span>📸</span> バーコードをスキャンしよう！
            </h2>
            
            <div class="relative flex-1 bg-slate-900 rounded-lg overflow-hidden flex flex-col items-center justify-center border-2 border-slate-700">
                <div id="scanner-container" class="absolute inset-0 w-full h-full flex items-center justify-center">
                    <div id="reader" class="w-full h-full"></div>
                    <!-- 狙いやすい一本線のレーザー -->
                    <div class="absolute left-0 right-0 h-0.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,1)] animate-pulse z-10"></div>
                    
                    <div id="camera-fallback-msg" class="absolute inset-0 bg-slate-950/90 text-white flex flex-col items-center justify-center p-6 text-center z-20 pointer-events-none">
                        <span class="text-4xl mb-3">📷</span>
                        <p class="font-bold mb-1">カメラを起動しています...</p>
                    </div>
                </div>
            </div>

            <div class="mt-3 flex flex-wrap gap-2 justify-between items-center">
                <button onclick="triggerMockScan()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-lg shadow active:scale-95 transition">
                    ⚡ ぴっ！(テスト用)
                </button>
                <div class="flex gap-2">
                    <button id="toggle-camera-btn" onclick="toggleCameraFacing()" class="bg-slate-600 hover:bg-slate-700 text-white font-bold py-2 px-3 text-sm rounded-lg">
                        📷 カメラ切り替え
                    </button>
                    <button onclick="clearCart()" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-3 text-sm rounded-lg">
                        カートをからにする
                    </button>
                </div>
            </div>
        </section>

        <section class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4 min-h-0 border border-emerald-100">
            <h2 class="text-xl font-bold mb-3 text-gray-700 border-b-2 border-gray-100 pb-2 flex items-center gap-1.5">
                <span>📋</span> おかいあげ商品
            </h2>
            
            <ul id="cart-list" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-1">
                <li id="cart-placeholder" class="text-gray-400 text-center mt-16">おかいもの を はじめよう！</li>
            </ul>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-lg font-bold text-gray-600">お買い上げ点数:</span>
                    <span id="total-count" class="text-xl font-bold">0 点</span>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-lg font-bold text-gray-600">ごうけい金額:</span>
                    <span class="text-3xl font-black text-rose-600"><span id="total-price">0</span> 円</span>
                </div>
                <button id="checkout-btn" onclick="openPaymentModal()" disabled class="w-full bg-emerald-500 text-white font-black py-4 rounded-xl text-xl shadow-lg hover:bg-emerald-600 transition disabled:bg-slate-300">
                    💳 おかいけいする
                </button>
            </div>
        </section>
    </main>

    <div id="payment-modal" class="hidden fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4">
        <div class="bg-sky-50 rounded-2xl shadow-2xl max-w-4xl w-full flex flex-col overflow-hidden border-4 border-sky-400">
            <div class="bg-sky-500 text-white p-4 text-center">
                <h3 class="text-2xl font-bold">おつりを けいさん しよう！</h3>
                <p id="payment-info" class="text-lg mt-1 font-semibold"></p>
            </div>

            <div class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-y-auto max-h-[75vh]">
                <!-- 左：ひっ算エリア -->
                <div class="flex-1 flex flex-col items-center">
                    <div class="w-full max-w-[340px] flex items-center justify-between mb-2 bg-white px-3 py-1.5 rounded-lg shadow-sm">
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500 font-bold">✍️ メモペン:</span>
                            <button onclick="setPenColor('#ef4444')" id="btn-pen-red" class="w-6 h-6 rounded-full bg-red-500 border-2 border-white ring-2 ring-red-500"></button>
                            <button onclick="setPenColor('#3b82f6')" id="btn-pen-blue" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white"></button>
                            <button onclick="setPenColor('#1e293b')" id="btn-pen-black" class="w-6 h-6 rounded-full bg-slate-800 border-2 border-white"></button>
                        </div>
                        <button onclick="clearCanvas()" class="text-xs bg-amber-100 text-amber-800 font-bold py-1 px-2.5 rounded">🧹 メモ消去</button>
                    </div>

                    <div class="relative w-full max-w-[340px] bg-white rounded-xl shadow-lg border-2 border-sky-300 p-2 overflow-hidden">
                        <div class="relative w-full" id="canvas-container">
                            <div id="calculation-grid-container"></div>
                            <canvas id="memo-canvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair z-20"></canvas>
                        </div>
                        <div id="answer-grid-container"></div>
                    </div>
                </div>

                <!-- 右：10キー -->
                <div class="flex-1 flex flex-col justify-center items-center max-w-sm mx-auto w-full">
                    <div class="grid grid-cols-3 gap-2 w-full font-kyokasho">
                        <button onclick="pressKey(7)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">7</button>
                        <button onclick="pressKey(8)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">8</button>
                        <button onclick="pressKey(9)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">9</button>
                        <button onclick="pressKey(4)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">4</button>
                        <button onclick="pressKey(5)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">5</button>
                        <button onclick="pressKey(6)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">6</button>
                        <button onclick="pressKey(1)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">1</button>
                        <button onclick="pressKey(2)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">2</button>
                        <button onclick="pressKey(3)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">3</button>
                        <button onclick="pressKey('C')" class="bg-rose-100 p-5 rounded-2xl text-xl font-bold hover:bg-rose-200">ぜんぶ消す</button>
                        <button onclick="pressKey(0)" class="bg-white p-5 rounded-2xl shadow-md border-2 text-3xl font-black hover:bg-slate-50">0</button>
                        <button onclick="pressKey('BS')" class="bg-amber-100 p-5 rounded-2xl text-xl font-bold hover:bg-amber-200">⬅とりけす</button>
                    </div>
                    <div class="mt-5 w-full flex gap-3">
                        <button onclick="closePaymentModal()" class="flex-1 bg-slate-400 text-white font-bold py-3 rounded-xl hover:bg-slate-500">やめる</button>
                        <button onclick="checkAnswer()" class="flex-2 w-[60%] bg-amber-500 text-white font-black py-3 rounded-xl text-xl hover:bg-amber-600">答え合わせ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4">
        <div class="flex flex-col items-center max-w-sm w-full my-auto">
            <div class="receipt-paper w-full bg-white text-slate-800 p-6 font-mono text-sm">
                <!-- よくできましたスタンプ（レシート紙面の内側・右上に完全固定） -->
                <div class="absolute top-4 right-4 border-4 border-rose-500 text-rose-500 text-xs font-black px-2 py-1 rounded-lg rotate-12 bg-white/90 shadow-sm">💮 よくできました</div>
                
                <div class="text-center mb-4 mt-2">
                    <div class="text-lg font-black font-kyokasho">🌻 こどもマーケット さくら店</div>
                    <div class="text-[10px] text-slate-400">おつり計算セルフレジ 特訓コーナー</div>
                </div>
                
                <div class="border-b border-dashed border-slate-300 my-2"></div>
                <div id="receipt-date" class="text-[10px] text-slate-500 text-center"></div>
                <div class="border-b border-dashed border-slate-300 my-2"></div>
                
                <!-- スキャンしたお買い物商品一覧が印字されるスペース -->
                <ul id="receipt-items-list" class="space-y-1 my-3 text-xs"></ul>
                
                <div class="border-b border-dashed border-slate-300 my-2"></div>
                
                <div class="space-y-1 font-bold">
                    <div class="flex justify-between text-base border-b pb-1">
                        <span>合計（内税）</span>
                        <span><span id="receipt-total-cost">0</span> 円</span>
                    </div>
                    <div class="flex justify-between pt-1 text-xs text-slate-600">
                        <span>お預かり</span>
                        <span><span id="receipt-paid-amount">0</span> 円</span>
                    </div>
                    <div class="flex justify-between text-lg text-emerald-600 border-t-2 border-double pt-1 mt-1">
                        <span>おつり</span>
                        <span><span id="receipt-change-amount">0</span> 円</span>
                    </div>
                </div>

                <!-- ダミーバーコード -->
                <div class="flex justify-center items-center gap-0.5 mt-6 mb-2 h-8 opacity-70">
                    <div class="w-1 h-full bg-slate-800"></div><div class="w-2 h-full bg-slate-800"></div><div class="w-1 h-full bg-slate-800"></div>
                    <div class="w-3 h-full bg-slate-800"></div><div class="w-1 h-full bg-slate-800"></div><div class="w-2 h-full bg-slate-800"></div>
                    <div class="w-1 h-full bg-slate-800"></div><div class="w-3 h-full bg-slate-800"></div><div class="w-2 h-full bg-slate-800"></div>
                    <div class="w-1 h-full bg-slate-800"></div><div class="w-2 h-full bg-slate-800"></div><div class="w-1 h-full bg-slate-800"></div>
                </div>
                
                <div class="text-center text-[10px] text-slate-400">
                    <p>お買い上げありがとうございました！</p>
                </div>
            </div>
            <button onclick="resetAppAndCloseSuccess()" class="w-full mt-6 bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl text-xl shadow-lg transition">つぎのお買い物へ！</button>
        </div>
    </div>

    <script>
        // 76種以上の子供に大人気のバラエティ豊かなダミー商品
        const dummyProducts = [
            { name: "りんご (🍎)", price: 124 }, { name: "みかん (🍊)", price: 87 }, { name: "バナナ (🍌)", price: 158 }, { name: "いちご (🍓)", price: 398 },
            { name: "メロン (🍈)", price: 980 }, { name: "すいか (🍉)", price: 1250 }, { name: "にんじん (🥕)", price: 93 }, { name: "トマト (🍅)", price: 115 },
            { name: "おにぎり (🍙)", price: 135 }, { name: "食パン (🍞)", price: 218 }, { name: "すし (🍣)", price: 880 }, { name: "プリン (🍮)", price: 198 },
            { name: "いたチョコ (🍫)", price: 108 }, { name: "ミニカー (🚗)", price: 495 }, { name: "えんぴつ (✏️)", price: 63 }, { name: "消しゴム (🧽)", price: 84 },
            { name: "リュック (🎒)", price: 3890 }, { name: "おりがみ (🎨)", price: 198 }, { name: "サッカーボール (⚽)", price: 1240 }, { name: "ポテト (🍟)", price: 243 },
            { name: "ドーナツ (🍩)", price: 154 }, { name: "ピザ (🍕)", price: 382 }, { name: "メロンパン (🍞)", price: 143 }, { name: "かさ (☂️)", price: 783 },
            { name: "ねんど (🎨)", price: 245 }, { name: "なわとび (➰)", price: 294 }, { name: "シール (🐟)", price: 112 }, { name: "はぶらし (🪥)", price: 112 },
            { name: "えほん (📖)", price: 836 }, { name: "グミ (🍬)", price: 122 }, { name: "カレー (🍛)", price: 624 }, { name: "コーラ (🥤)", price: 138 }
        ];
        
        // 商品リスト拡張
        for(let i=0; i<45; i++) {
            dummyProducts.push({ name: `おたのしみパック${i+1} (🎁)`, price: 100 + (i*7) + (i % 3) });
        }

        let cart = [], solvedCount = 0;
        let totalAmount = 0, paidAmount = 0, changeAmount = 0, currentFocusIndex = 0, userAnswers = ["","","",""];
        let canvas, ctx, isDrawing = false, penColor = "#ef4444";
        let html5QrScanner = null, isFrontCamera = true;

        // FNV-1a 高精度ハッシュアルゴリズムでバーコード別に完全固有の商品を指定
        function getProductFromBarcode(barcode) {
            let hash = 2166136261;
            for (let i = 0; i < barcode.length; i++) {
                hash = Math.imul(hash ^ barcode.charCodeAt(i), 16777619);
            }
            return dummyProducts[Math.abs(hash) % dummyProducts.length];
        }

        window.onload = () => { 
            initScanner(); 
            setupMemoCanvas(); 
            renderCart(); 
        };

        async function initScanner() {
            const container = document.getElementById("camera-fallback-msg");
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    startScanning(devices[0].id);
                } else {
                    container.innerHTML = "カメラが見つかりません。テストボタンで遊んでね！";
                }
            } catch (err) {
                container.innerHTML = "カメラを起動できませんでした。";
            }
        }

        function startScanning(cameraId) {
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => launch(cameraId)).catch(() => launch(cameraId));
            } else {
                launch(cameraId);
            }
        }

        function launch(cameraId) {
            html5QrScanner = new Html5Qrcode("reader");
            const readerDiv = document.getElementById("reader");
            if (isFrontCamera) {
                readerDiv.classList.remove("back-camera");
            } else {
                readerDiv.classList.add("back-camera");
            }

            html5QrScanner.start(cameraId, {
                fps: 15,
                // スキャン枠を少し大きくして合わせやすく調整
                qrbox: (w, h) => {
                    const scanWidth = Math.min(w * 0.8, 280);
                    const scanHeight = Math.min(h * 0.4, 140);
                    return { width: scanWidth, height: scanHeight };
                }
            }, onScanSuccess).then(() => {
                document.getElementById("camera-fallback-msg").classList.add("hidden");
            }).catch(e => console.log(e));
        }

        // 誤認防止フィルター（連続2回一致で検知成功）
        let lastScanTime = 0, pendingBarcode = null, pendingBarcodeCount = 0;
        function onScanSuccess(code) {
            const now = Date.now();
            if (now - lastScanTime < 1800) return;
            
            if (pendingBarcode === code) {
                pendingBarcodeCount++;
                if (pendingBarcodeCount >= 2) { // 2回連続で素早く反応
                    lastScanTime = now; 
                    pendingBarcodeCount = 0;
                    addToCart(getProductFromBarcode(code));
                }
            } else {
                pendingBarcode = code; 
                pendingBarcodeCount = 1;
            }
        }

        function toggleCameraFacing() {
            isFrontCamera = !isFrontCamera;
            initScanner();
        }

        function triggerMockScan() {
            addToCart(dummyProducts[Math.floor(Math.random() * dummyProducts.length)]);
        }

        function addToCart(product) {
            new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:0.005,decay:0.1}}).toDestination().triggerAttackRelease("D6", "32n");
            document.getElementById("scanner-container").classList.add("ring-8", "ring-emerald-400");
            setTimeout(() => document.getElementById("scanner-container").classList.remove("ring-8", "ring-emerald-400"), 150);
            cart.push({ ...product, id: Date.now() + Math.random() });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById("cart-list");
            list.innerHTML = "";
            let total = 0;
            if (cart.length === 0) {
                list.innerHTML = `<li class="text-gray-400 text-center mt-16">おかいもの を はじめよう！</li>`;
            } else {
                cart.forEach(item => {
                    total += item.price;
                    const li = document.createElement("li");
                    li.className = "flex justify-between items-center bg-emerald-50 p-3 rounded-lg border border-emerald-100";
                    li.innerHTML = `
                        <span class="font-bold text-gray-800">${item.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-emerald-700">${item.price} 円</span>
                            <button onclick="removeItem(${item.id})" class="bg-rose-100 text-rose-700 text-xs px-2.5 py-1 rounded-lg font-bold hover:bg-rose-200 transition">とりけす</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }
            document.getElementById("total-count").innerText = cart.length + " 点";
            document.getElementById("total-price").innerText = total.toLocaleString();
            document.getElementById("checkout-btn").disabled = cart.length === 0;
        }

        function removeItem(id) { 
            cart = cart.filter(i => i.id !== id); 
            renderCart(); 
        }
        
        function clearCart() { 
            cart = []; 
            renderCart(); 
        }

        // 賢い端数支払いロジック (例: 2854円のとき 3054円を提示)
        function getOptimalPayment(total) {
            const basic = total <= 1000 ? Math.ceil(total/500)*500 : Math.ceil(total/1000)*1000;
            if (solvedCount < 1) return basic === total ? basic + 1000 : basic;
            
            const rand = Math.random();
            if (rand < 0.5) {
                const hasu = total % 100; // 端数(一・十の位)
                const base = Math.ceil(total/1000)*1000;
                if (hasu > 0 && (base + hasu) > total) return base + hasu;
            }
            return (total < 4000 && Math.random() > 0.6) ? 5000 : (basic === total ? basic + 1000 : basic);
        }

        function openPaymentModal() {
            totalAmount = cart.reduce((s, i) => s + i.price, 0);
            paidAmount = getOptimalPayment(totalAmount);
            changeAmount = paidAmount - totalAmount;
            document.getElementById("payment-info").innerText = `ごうけい ${totalAmount} 円。おさいふから ${paidAmount} 円 だしました！`;
            renderGrid();
            document.getElementById("payment-modal").classList.remove("hidden");
            setTimeout(resizeCanvas, 100);
        }

        // 5列または6列のグリッドを動的に切り替えて構築
        function renderGrid() {
            const cols = paidAmount >= 10000 ? 6 : 5;
            const container = document.getElementById("calculation-grid-container");
            container.innerHTML = `<div id="calculation-grid" class="grid grid-cols-${cols} border-t border-l border-sky-200"></div>`;
            const grid = container.firstChild;

            const paidStr = paidAmount.toString().padStart(cols, " ");
            const totalStr = totalAmount.toString().padStart(cols - 1, " ");

            // 1行目：くり下がり行 (高さh-24でたっぷり2つ数字を書ける)
            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-24 bg-sky-50/30"></div>`; 
            // 2行目：ひかれる数
            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-16 text-3xl font-bold font-kyokasho text-slate-800">${paidStr[i] !== " " ? paidStr[i] : ""}</div>`; 
            // 3行目：マイナス記号 ＆ ひく数
            grid.innerHTML += `<div class="graph-cell h-16 text-5xl font-black text-blue-600 font-kyokasho">－</div>`; 
            for(let i=0; i<cols-1; i++) grid.innerHTML += `<div class="graph-cell h-16 text-3xl font-bold font-kyokasho text-slate-800">${totalStr[i] !== " " ? totalStr[i] : ""}</div>`;
            // 4行目：太い横線
            grid.innerHTML += `<div class="col-span-${cols} h-1.5 bg-slate-800 my-1"></div>`; 
            // 5行目：横線下の手書きメモスペース
            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-16 bg-sky-50/10"></div>`; 

            // 6行目：解答入力枠
            const ansContainer = document.getElementById("answer-grid-container");
            ansContainer.innerHTML = `<div class="grid grid-cols-${cols} mt-2"><div class="flex items-center justify-center text-2xl font-black text-slate-400">=</div></div>`;
            const ansGrid = ansContainer.firstChild;
            if(cols===6) ansGrid.innerHTML += `<div class="m-1 h-16"></div>`; // 1万の位の空き
            // 千の位〜一の位の入力枠
            for(let i=3; i>=0; i--) ansGrid.innerHTML += `<div onclick="focusDigit(${i})" id="ans-box-${i}" class="m-1 h-16 bg-amber-50 border-2 border-slate-300 rounded-lg flex items-center justify-center text-3xl font-black text-amber-700 transition"></div>`;
            
            userAnswers = ["","","",""]; 
            focusDigit(0);
        }

        function focusDigit(idx) {
            currentFocusIndex = idx;
            for(let i=0; i<4; i++) {
                const b = document.getElementById(`ans-box-${i}`);
                if(b) b.className = (i===idx) ? "m-1 h-16 bg-yellow-100 border-4 border-amber-400 rounded-lg flex items-center justify-center text-3xl font-black text-amber-800 scale-105" : "m-1 h-16 bg-amber-50 border-2 border-slate-300 rounded-lg flex items-center justify-center text-3xl font-black text-amber-700";
            }
        }

        function pressKey(k) {
            if(typeof k === 'number') {
                userAnswers[currentFocusIndex] = k.toString();
                document.getElementById(`ans-box-${currentFocusIndex}`).innerText = k;
                if(currentFocusIndex < 3) focusDigit(currentFocusIndex + 1);
            } else if(k === 'BS') {
                userAnswers[currentFocusIndex] = ""; 
                document.getElementById(`ans-box-${currentFocusIndex}`).innerText = "";
                if(currentFocusIndex > 0) focusDigit(currentFocusIndex - 1);
            } else if(k === 'C') {
                userAnswers = ["","","",""]; 
                for(let i=0; i<4; i++) { 
                    const b = document.getElementById(`ans-box-${i}`); 
                    if(b) b.innerText = ""; 
                } 
                focusDigit(0);
            }
        }

        function checkAnswer() {
            let s = ""; 
            for(let i=3; i>=0; i--) s += userAnswers[i] || (s===""?"":"0");
            
            if(parseInt(s || "0") === changeAmount) {
                // 正解のサウンド
                playCorrectChime();
                solvedCount++; 
                document.getElementById("payment-modal").classList.add("hidden");
                
                // 日付を取得してレシートへ印字
                const d = new Date(); 
                document.getElementById("receipt-date").innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                
                // 買った商品を省略なしで全明細印字
                const list = document.getElementById("receipt-items-list"); 
                list.innerHTML = "";
                cart.forEach(i => {
                    list.innerHTML += `
                        <div class="flex justify-between">
                            <span>${i.name}</span>
                            <span>${i.price} 円</span>
                        </div>`;
                });
                
                // お会計額・お預かり額・おつり額の印字
                document.getElementById("receipt-total-cost").innerText = totalAmount.toLocaleString();
                document.getElementById("receipt-paid-amount").innerText = paidAmount.toLocaleString();
                document.getElementById("receipt-change-amount").innerText = changeAmount.toLocaleString();
                
                // レシートモーダルを表示
                document.getElementById("success-modal").classList.remove("hidden");
            } else {
                // 不正解時のエラー音（画面ゆらしは行わない仕様）
                new Tone.Synth().toDestination().triggerAttackRelease("A3", "4n");
            }
        }

        function playCorrectChime() {
            const synthChime = new Tone.PolySynth().toDestination();
            const now = Tone.now();
            synthChime.triggerAttackRelease("C5", "8n", now);
            synthChime.triggerAttackRelease("E5", "8n", now + 0.1);
            synthChime.triggerAttackRelease("G5", "8n", now + 0.2);
            synthChime.triggerAttackRelease("C6", "4n", now + 0.3);
        }

        function resetAppAndCloseSuccess() { 
            document.getElementById("success-modal").classList.add("hidden"); 
            cart = []; 
            renderCart(); 
        }
        
        function closePaymentModal() { 
            document.getElementById("payment-modal").classList.add("hidden"); 
        }

        function setupMemoCanvas() {
            canvas = document.getElementById("memo-canvas"); 
            ctx = canvas.getContext("2d");
            
            const draw = (e) => {
                if(!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                ctx.lineTo(x, y); 
                ctx.strokeStyle = penColor; 
                ctx.lineWidth = 4; 
                ctx.lineCap = "round"; 
                ctx.stroke();
            };
            
            canvas.onmousedown = (e) => { 
                isDrawing = true; 
                ctx.beginPath(); 
                const r = canvas.getBoundingClientRect(); 
                ctx.moveTo(e.clientX-r.left, e.clientY-r.top); 
            };
            canvas.onmousemove = draw;
            window.onmouseup = () => isDrawing = false;
            
            canvas.ontouchstart = (e) => { 
                isDrawing = true; 
                ctx.beginPath(); 
                const r = canvas.getBoundingClientRect(); 
                ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); 
                e.preventDefault(); 
            };
            canvas.ontouchmove = (e) => { 
                draw(e); 
                e.preventDefault(); 
            };
        }
        
        function resizeCanvas() { 
            const c = document.getElementById("canvas-container"); 
            canvas.width = c.offsetWidth; 
            canvas.height = c.offsetHeight; 
        }
        
        function setPenColor(c) { 
            penColor = c; 
        }
        
        function clearCanvas() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }
    </script>
</body>
</html>
