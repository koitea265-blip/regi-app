<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算数セルフレジ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5 QR Code (バーコードリーダー) -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Tone.js (効果音) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f3f4f6; }
        /* ひっ算用の等幅フォントと右揃え設定 */
        .math-font { font-family: 'Courier New', Courier, monospace; letter-spacing: 0.5rem; }
        .receipt-scroll { max-height: 40vh; overflow-y: auto; }
        
        /* 成功時のスタンプアニメーション */
        @keyframes stamp {
            0% { transform: scale(5) rotate(-20deg); opacity: 0; }
            50% { transform: scale(0.8) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }
        .stamp-animation { animation: stamp 0.5s ease-out forwards; color: #ef4444; border: 8px solid #ef4444; }

        /* カメラ反転用のCSS (idセレクタで強力に効かせる) */
        #reader video {
            transform: scaleX(-1) !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">🛒 算数セルフレジ</h1>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        
        <!-- 左側：スキャンエリア -->
        <section class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-700">バーコードをかざしてね</h2>
            
            <div id="reader-container" class="flex-1 flex flex-col justify-center items-center bg-gray-100 rounded-lg overflow-hidden relative">
                <!-- カメラ映像がここに直接描画される -->
                <div id="reader" class="w-full h-full max-h-[300px]"></div>
            </div>
            
            <p id="scan-status" class="text-center mt-4 text-sm text-gray-600 font-bold bg-yellow-100 p-2 rounded">
                カメラをじゅんび中...
            </p>

            <div class="flex gap-2 mt-4">
                <button onclick="toggleCamera()" id="toggle-camera-btn" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 text-sm hidden">
                    📷 カメラ切替
                </button>
                <button onclick="simulateScan()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 text-sm">
                    ピッ！(テスト)
                </button>
            </div>
        </section>

        <!-- 右側：レジ（カート）エリア -->
        <section class="flex-1 bg-white rounded-xl shadow-lg flex flex-col p-4 relative">
            <h2 class="text-xl font-bold mb-4 text-gray-700 border-b-2 border-gray-200 pb-2">おかいあげ</h2>
            
            <!-- 購入商品リスト -->
            <ul id="cart-list" class="receipt-scroll flex-1 space-y-2 mb-4">
                <li class="text-gray-400 text-center mt-10">商品がありません</li>
            </ul>

            <!-- 合計金額と会計ボタン -->
            <div class="border-t-4 border-gray-800 pt-4">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-xl font-bold text-gray-700">ごうけい</span>
                    <span class="text-3xl font-bold text-red-600">¥<span id="total-price">0</span></span>
                </div>
                <button onclick="startCheckout()" id="checkout-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-4 rounded-xl shadow-lg transform transition active:scale-95 disabled:bg-gray-400 disabled:transform-none">
                    おかいけいする
                </button>
            </div>
        </section>
    </main>

    <div id="math-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="bg-blue-600 text-white p-4 text-center">
                <h3 class="text-xl font-bold">おつりを けいさん しよう！</h3>
                <p id="payment-text" class="text-sm mt-1"></p>
            </div>
            
            <div class="p-6 flex-1 flex flex-col items-center justify-center bg-gray-50">
                <!-- ひっ算表示エリア -->
                <div class="text-4xl math-font font-bold text-right flex flex-col items-end border-b-4 border-gray-800 pb-2 w-48">
                    <div id="math-payment" class="tracking-[0.5em]">1000</div>
                    <div class="flex items-center w-full justify-between">
                        <span class="">-</span>
                        <span id="math-total" class="tracking-[0.5em]">850</span>
                    </div>
                </div>
                <!-- 入力エリア -->
                <div id="math-answer" class="text-5xl math-font font-bold text-blue-600 text-right w-48 mt-2 h-12 tracking-[0.5em]">
                    <!-- 入力された数字がここに入る -->
                </div>
                <p id="math-message" class="h-6 text-red-500 font-bold mt-2"></p>
            </div>

            <!-- テンキー (10キー) -->
            <div class="grid grid-cols-3 gap-2 p-4 bg-gray-200">
                <button onclick="inputNumber(7)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">7</button>
                <button onclick="inputNumber(8)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">8</button>
                <button onclick="inputNumber(9)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">9</button>
                <button onclick="inputNumber(4)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">4</button>
                <button onclick="inputNumber(5)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">5</button>
                <button onclick="inputNumber(6)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">6</button>
                <button onclick="inputNumber(1)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">1</button>
                <button onclick="inputNumber(2)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">2</button>
                <button onclick="inputNumber(3)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">3</button>
                <button onclick="clearNumber()" class="bg-red-200 text-red-800 py-3 text-xl font-bold rounded shadow hover:bg-red-300">クリア</button>
                <button onclick="inputNumber(0)" class="bg-white py-3 text-2xl font-bold rounded shadow hover:bg-gray-100">0</button>
                <button onclick="checkAnswer()" class="bg-green-500 text-white py-3 text-xl font-bold rounded shadow hover:bg-green-600">こたえあわせ</button>
            </div>
            
            <button onclick="closeModal()" class="w-full py-3 bg-gray-300 text-gray-700 font-bold">やめる</button>
        </div>
    </div>

    <div id="success-overlay" class="fixed inset-0 bg-white bg-opacity-90 hidden flex flex-col justify-center items-center z-[60]">
        <div class="stamp-animation rounded-full w-64 h-64 flex items-center justify-center bg-white shadow-2xl">
            <span class="text-5xl font-black">大正解!!</span>
        </div>
        <button onclick="resetApp()" class="mt-12 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full shadow-lg text-2xl">
            つぎのお客さんをよぶ
        </button>
    </div>

    <script>
        // ==========================================
        // 商品データと状態管理
        // ==========================================
        const productDB = [
            { name: "おいしい牛乳", price: 250 },
            { name: "メロンパン", price: 150 },
            { name: "ポテトチップス", price: 180 },
            { name: "板チョコレート", price: 120 },
            { name: "シャケおにぎり", price: 130 },
            { name: "りんご", price: 100 },
            { name: "オレンジジュース", price: 160 },
            { name: "カップラーメン", price: 220 }
        ];

        let cart = [];
        let html5QrCode = null;
        let lastScanTime = 0;
        let currentFacingMode = "user"; // デフォルトを前面(user)に設定
        let isScanning = false;
        
        // 算数用の状態
        let currentTotal = 0;
        let currentPayment = 0;
        let correctAnswer = 0;
        let userAnswer = "";

        // ==========================================
        // 音声・カメラの初期化
        // ==========================================
        window.onload = function() {
            initScanner();
            updateCartUI();
        };

        async function initScanner() {
            const statusEl = document.getElementById('scan-status');
            statusEl.innerText = "カメラを起動中...";
            
            try {
                // 1. カメラが存在するかチェック
                const devices = await Html5Qrcode.getCameras();
                if (!devices || devices.length === 0) {
                    throw new Error("カメラデバイスが見つかりません");
                }

                // 複数カメラがある場合は切替ボタンを表示
                if (devices.length > 1) {
                    document.getElementById('toggle-camera-btn').classList.remove('hidden');
                }

                html5QrCode = new Html5Qrcode("reader");
                startCamera();

            } catch (err) {
                console.warn("カメラの起動をスキップしました: ", err);
                statusEl.innerText = "カメラが使えないみたい。下のボタンで遊んでね！";
                statusEl.className = "text-center mt-4 text-sm text-red-700 font-bold bg-red-100 p-2 rounded";
            }
        }

        async function startCamera() {
            const statusEl = document.getElementById('scan-status');
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                // 反転した状態でもバーコードを読めるようにする設定
                disableFlip: false 
            };

            try {
                // 現在のfacingMode(前面or背面)で起動
                await html5QrCode.start({ facingMode: currentFacingMode }, config, onScanSuccess, onScanFailure);
                isScanning = true;
                statusEl.innerText = currentFacingMode === "user" ? "前面カメラ起動中！" : "背面カメラ起動中！";
                statusEl.className = "text-center mt-4 text-sm text-green-700 font-bold bg-green-100 p-2 rounded";
                
                // 前面カメラの時だけ映像を反転させるクラスを付け外しする
                const readerDiv = document.getElementById('reader');
                if(currentFacingMode === "user"){
                   readerDiv.classList.add("flipped-video");
                } else {
                   readerDiv.classList.remove("flipped-video");
                }

            } catch (err) {
                console.warn("指定のカメラ起動失敗:", err);
                statusEl.innerText = "カメラ起動エラー。テストボタンを使ってね。";
                statusEl.className = "text-center mt-4 text-sm text-red-700 font-bold bg-red-100 p-2 rounded";
            }
        }

        async function toggleCamera() {
            if (isScanning && html5QrCode) {
                await html5QrCode.stop();
                isScanning = false;
            }
            // 前面と背面を切り替える
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            
            // CSSによる反転処理の切り替え（背面カメラは反転させない）
            const readerStyle = document.getElementById('reader');
            if (currentFacingMode === "user") {
                readerStyle.style.transform = "scaleX(-1)";
            } else {
                readerStyle.style.transform = "none";
            }
            
            startCamera();
        }

        // ==========================================
        // スキャン・レジ処理
        // ==========================================
        function onScanSuccess(decodedText, decodedResult) {
            // 連続スキャン防止 (2秒間隔)
            if (Date.now() - lastScanTime < 2000) return;
            lastScanTime = Date.now();
            addToCart();
        }

        function onScanFailure(error) {
            // スキャン中、バーコードが見つからないフレームごとに呼ばれるため無視する
        }

        async function simulateScan() {
            if (typeof Tone !== 'undefined') {
                try { await Tone.start(); } catch(e){}
            }
            addToCart();
        }

        function addToCart() {
            // ランダムに商品を選ぶ
            const product = productDB[Math.floor(Math.random() * productDB.length)];
            cart.push(product);
            
            // ピッ！という音を鳴らす
            playBeep();
            
            updateCartUI();
        }

        function updateCartUI() {
            const listEl = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                listEl.innerHTML = '<li class="text-gray-400 text-center mt-10">商品がありません</li>';
                totalEl.innerText = '0';
                checkoutBtn.disabled = true;
                return;
            }

            checkoutBtn.disabled = false;
            listEl.innerHTML = '';
            currentTotal = 0;

            cart.forEach((item, index) => {
                currentTotal += item.price;
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-100";
                li.innerHTML = `
                    <span class="font-bold text-gray-700">${item.name}</span>
                    <span class="font-bold text-gray-900">¥${item.price}</span>
                `;
                listEl.appendChild(li);
            });

            totalEl.innerText = currentTotal;
            // スクロールを一番下へ
            listEl.scrollTop = listEl.scrollHeight;
        }

        // ==========================================
        // 算数（おつり計算）処理
        // ==========================================
        function startCheckout() {
            if (currentTotal === 0) return;

            // 支払い金額を自動決定（合計より大きく、キリの良い数字）
            if (currentTotal <= 500) {
                currentPayment = 500;
            } else if (currentTotal <= 1000) {
                currentPayment = 1000;
            } else if (currentTotal <= 5000) {
                currentPayment = 5000;
            } else {
                currentPayment = 10000;
            }

            // もし合計と支払いが同じなら、1000円追加して必ずお釣りが出るようにする
            if (currentPayment === currentTotal) {
                currentPayment += 1000;
            }

            correctAnswer = currentPayment - currentTotal;
            userAnswer = "";

            // UI更新
            document.getElementById('payment-text').innerText = `合計 ${currentTotal}円。${currentPayment}円 出しました。`;
            document.getElementById('math-payment').innerText = currentPayment;
            document.getElementById('math-total').innerText = currentTotal;
            document.getElementById('math-answer').innerText = "";
            document.getElementById('math-message').innerText = "";

            // モーダル表示
            document.getElementById('math-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('math-modal').classList.add('hidden');
        }

        // テンキー入力処理
        function inputNumber(num) {
            if (userAnswer.length >= 5) return; // 桁数制限
            if (userAnswer === "" && num === 0) return; // 最初が0はダメ
            userAnswer += num.toString();
            document.getElementById('math-answer').innerText = userAnswer;
            document.getElementById('math-message').innerText = "";
        }

        function clearNumber() {
            userAnswer = "";
            document.getElementById('math-answer').innerText = "";
            document.getElementById('math-message').innerText = "";
        }

        function checkAnswer() {
            if (userAnswer === "") return;

            if (parseInt(userAnswer) === correctAnswer) {
                // 正解
                playSuccess();
                closeModal();
                document.getElementById('success-overlay').classList.remove('hidden');
            } else {
                // 不正解
                playError();
                document.getElementById('math-message').innerText = "ちがうみたい。もういちど けいさん してみよう！";
                userAnswer = "";
                document.getElementById('math-answer').innerText = "";
            }
        }

        function resetApp() {
            cart = [];
            updateCartUI();
            document.getElementById('success-overlay').classList.add('hidden');
        }

        // ==========================================
        // 音声処理 (Tone.js)
        // ==========================================
        let beepSynth = null;
        let successSynth = null;
        let errorSynth = null;

        function initSynths() {
            // 音声合成オブジェクトを遅延初期化（エラー回避）
            if (!beepSynth && typeof Tone !== 'undefined') {
                beepSynth = new Tone.Synth().toDestination();
                successSynth = new Tone.PolySynth().toDestination();
                errorSynth = new Tone.Synth().toDestination();
            }
        }

        async function playBeep() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initSynths();
                beepSynth.triggerAttackRelease("C6", "0.1");
            } catch(e){}
        }

        async function playSuccess() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initSynths();
                successSynth.triggerAttackRelease(["C5", "E5", "G5"], "0.4");
                setTimeout(() => {
                    successSynth.triggerAttackRelease(["C6", "E6", "G6"], "0.6");
                }, 200);
            } catch(e){}
        }

        async function playError() {
            if (typeof Tone === 'undefined') return;
            try {
                await Tone.start();
                initSynths();
                errorSynth.triggerAttackRelease("C3", "0.3");
            } catch(e){}
        }
    </script>
</body>
</html>
