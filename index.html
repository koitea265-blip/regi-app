<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>セルフレジでおかいけいしよう</title>
    
    <!-- Tailwind CSS (バージョン 3.4.15 に固定) -->
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <!-- Html5-Qrcode (バージョン 2.3.8 に固定) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Tone.js (バージョン 14.8.49 に固定) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* 基本UI：かわいい丸ゴシック系 */
        body, button, input, p, h1, h2, h3, h4, span {
            font-family: 'M PLUS Rounded 1c', "Hiragino Maru Gothic ProN", "BIZ UDPGothic", sans-serif;
        }

        /* 筆算エリア・レシート：正確なゴシック・丸ゴシックを最優先で適用し、かすれを完全防止 */
        .font-kyokasho, #calculation-grid .graph-cell, [id^="ans-box-"] {
            font-family: 'M PLUS Rounded 1c', "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif !important;
        }

        /* カメラの左右反転（鏡）かつ1.8倍デジタルズーム表示（デフォルト適用） */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            transform: scale(-1.8, 1.8) !important; /* 鏡 ＆ 1.8倍拡大 */
            transform-origin: center !important;
            transition: filter 0.3s ease;
        }

        /* 背面カメラ切り替え時の向き補正（鏡なし ＆ 1.8倍ズーム） */
        .back-camera video {
            transform: scale(1.8, 1.8) !important; 
        }

        /* 暗所ブースト（白黒＋超高コントラスト＋高輝度）でバーコード認識率を強制最大化 */
        .dark-boost-active video {
            filter: brightness(1.6) contrast(1.9) grayscale(1) !important;
        }

        /* 【二重枠対策】ライブラリが動的に自動生成する枠、L字境界、SVG、ボタン、余計なテキストを完全消滅させる */
        #reader__scan_region, 
        #reader svg, 
        #reader span, 
        #reader button {
            display: none !important;
        }

        /* ライブラリ動的生成要素のボーダーやボックスシャドウ、背景色を強制リセット（ビデオトラックのみを生かす） */
        #reader div, 
        #reader td, 
        #reader table {
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
            background-color: transparent !important;
        }

        /* 方眼罫線 */
        .graph-cell {
            position: relative;
            border-right: 1px solid #bae6fd;
            border-bottom: 1px solid #bae6fd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-select { 
            -webkit-touch-callout: none; 
            user-select: none; 
        }

        /* フラットなリアルレシートのスタイル */
        .receipt-paper {
            position: relative; /* スタンプの配置基準点 */
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            border-top: 8px solid #10b981; /* 上部のエメラルドカラーの太線 */
        }

        /* 赤い読み取りレーザーの上下ループスイープアニメーション (自製スキャン窓の中だけで動作) */
        @keyframes laser-sweep {
            0% { 
                top: 8%; 
                opacity: 0.4; 
                filter: drop-shadow(0 0 1px rgba(239, 68, 68, 0.7));
            }
            50% { 
                top: 92%; 
                opacity: 1; 
                filter: drop-shadow(0 0 4px rgba(239, 68, 68, 1)) drop-shadow(0 0 8px rgba(239, 68, 68, 0.8));
            }
            100% { 
                top: 8%; 
                opacity: 0.4; 
                filter: drop-shadow(0 0 1px rgba(239, 68, 68, 0.7));
            }
        }

        /* 暗所ブースト時のスキャナーレーザー（暗視風グリーンに変化） */
        @keyframes laser-sweep-boost {
            0% { 
                top: 8%; 
                opacity: 0.4; 
                filter: drop-shadow(0 0 1px rgba(16, 185, 129, 0.7));
            }
            50% { 
                top: 92%; 
                opacity: 1; 
                filter: drop-shadow(0 0 4px rgba(16, 185, 129, 1)) drop-shadow(0 0 8px rgba(16, 185, 129, 0.8));
            }
            100% { 
                top: 8%; 
                opacity: 0.4; 
                filter: drop-shadow(0 0 1px rgba(16, 185, 129, 0.7));
            }
        }

        .scanning-laser {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #ef4444;
            z-index: 10;
            animation: laser-sweep 2.2s infinite ease-in-out;
            pointer-events: none;
        }

        .dark-boost-active .scanning-laser {
            background-color: #10b981 !important;
            animation: laser-sweep-boost 1.6s infinite ease-in-out; /* 検出サイクルを速めてアライブ感を強化 */
        }
    </style>
</head>

                    <!-- 【本質的解決：完全自製アライメントファインダー】 -->
                    <!-- 外側を半透明のSlate色で暗転させ、中央に完璧に 1.44 : 0.5 のアスペクト窓をくり抜く -->
                    <div class="absolute inset-0 z-10 pointer-events-none flex items-center justify-center overflow-hidden">
                        <div class="relative w-[75%] aspect-[1.44/0.5] max-w-[440px] min-w-[200px] rounded-lg shadow-[0_0_0_9999px_rgba(15,23,42,0.65)] flex items-center justify-center border border-white/20">
                            
                            <!-- 白いL字の4隅フレーム（カメラ環境に絶対に左右されない） -->
                            <div class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-white rounded-tl-sm"></div>
                            <div class="absolute top-0 right-0 w-6 h-6 border-t-4 border-r-4 border-white rounded-tr-sm"></div>
                            <div class="absolute bottom-0 left-0 w-6 h-6 border-b-4 border-l-4 border-white rounded-bl-sm"></div>

                    </div>

            </div>

            <div class="mt-3 flex flex-wrap gap-2 justify-between items-center">

            { name: "タコ焼きパック (🐙)", price: 415 },
            { name: "ビーフカレー (🍛)", price: 624 },
            { name: "ポテトチップス (🥔)", price: 119 },
            { name: "フルーツグミ (🍬)", price: 122 },
            { name: "シュワシュワラムネ (🍾)", price: 98 },
            { name: "水ようかん (🍡)", price: 132 },
            { name: "あんこたい焼き (🐟)", price: 165 },
            { name: "保冷水筒 (🍶)", price: 1890 },
            { name: "子ども用歯ブラシ (🪥)", price: 112 },
            { name: "おもしろい絵本 (📖)", price: 836 },
            { name: "星のキーホルダー (🔑)", price: 345 },
            { name: "ポップコーン (🍿)", price: 184 },
            { name: "ホットドッグ (🌭)", price: 263 },
            { name: "ピースピザ (🍕)", price: 382 },
            { name: "メロンパン (🍞)", price: 143 },
            { name: "シュークリーム (🧁)", price: 152 },
            { name: "わたがし (☁️)", price: 112 },
            { name: "フランクフルト (🌭)", price: 194 },
            { name: "おえかきちょう (🎨)", price: 145 },
            { name: "12色クレヨン (🖍️)", price: 382 },
            { name: "水彩えのぐ (🎨)", price: 684 },
            { name: "虫めがね (🔍)", price: 215 },
            { name: "虫かご (🕸️)", price: 432 },
            { name: "カラフルなわとび (➰)", price: 294 },
            { name: "シャボン玉セット (🫧)", price: 134 },
            { name: "お花のヘアクリップ (🌸)", price: 94 },
            { name: "ぷくぷくシール (🐟)", price: 112 },
            { name: "らいおんバッジ (🦁)", price: 183 },
            { name: "ねこペンケース (✏️)", price: 594 },
            { name: "キャラクターかさ (☂️)", price: 783 },
            { name: "どうぶつハンカチ (🧼)", price: 143 },
            { name: "じゆうちょう (📒)", price: 123 },
            { name: "30cmじょうぎ (📏)", price: 134 },
            { name: "カラフルねんど (🎨)", price: 245 },
            { name: "バドミントンシャトル (🏸)", price: 184 }
        ];

        let cart = [], solvedCount = 0;
        let totalAmount = 0, paidAmount = 0, changeAmount = 0, currentFocusIndex = 0, userAnswers = ["","","",""];
        let canvas, ctx, isDrawing = false, penColor = "#ef4444";
        let html5QrScanner = null, isFrontCamera = true;
        let isSolved = false; // 正解済みかどうかのフラグ
        let isDarkBoost = false; // 暗所ブーストON/OFFフラグ

        // FNV-1a 高精度ハッシュアルゴリズム
        function getProductFromBarcode(barcode) {
            let hash = 2166136261;
            for (let i = 0; i < barcode.length; i++) {
                hash = Math.imul(hash ^ barcode.charCodeAt(i), 16777619);
            }
            const baseModulo = 75; 
            const index = Math.abs(hash) % baseModulo;
            return dummyProducts[index % dummyProducts.length];
        }

        window.onload = () => { 
            initScanner(); 
            setupMemoCanvas(); 
            renderCart(); 
        };

        // 暗所ブースト機能の切り替え
        function toggleDarkBoost() {
            isDarkBoost = !isDarkBoost;
            const container = document.getElementById("scanner-container");
            const btnText = document.getElementById("dark-boost-text");
            const btnIcon = document.getElementById("dark-boost-icon");
            const btn = document.getElementById("dark-boost-btn");

            if (isDarkBoost) {
                container.classList.add("dark-boost-active");
                btnText.innerText = "くらやみブースト: ON";
                btnIcon.innerText = "🌟";
                btn.className = "bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-1.5 px-3 rounded-full text-xs flex items-center gap-1 shadow transition animate-pulse";
            } else {
                container.classList.remove("dark-boost-active");
                btnText.innerText = "くらやみブースト: OFF";
                btnIcon.innerText = "🌙";
                btn.className = "bg-slate-800 hover:bg-slate-900 text-yellow-300 font-bold py-1.5 px-3 rounded-full text-xs flex items-center gap-1 shadow transition";
            }
        }

        async function initScanner() {
            const container = document.getElementById("camera-fallback-msg");
            container.classList.remove("hidden");
            container.innerHTML = `
                <span class="text-4xl mb-3">📷</span>
                <p class="font-bold mb-1">カメラを起動しています...</p>
            `;

            try {
                if (html5QrScanner) {
                    try {
                        await html5QrScanner.stop();
                    } catch (e) {
                        // 無視
                    }
                }

                html5QrScanner = new Html5Qrcode("reader");
                const readerDiv = document.getElementById("reader");
                
                if (isFrontCamera) {
                    readerDiv.classList.remove("back-camera");
                } else {
                    readerDiv.classList.add("back-camera");
                }

                const facingMode = isFrontCamera ? "user" : "environment";

                await html5QrScanner.start(
                    { facingMode: facingMode }, // キーは1つだけにする
                    {
                        fps: 30, // fpsを30に設定：手ブレの合間の一瞬の合致をキャッチする
                        experimentalFeatures: {
                            useBarCodeDetectorIfSupported: true // GPUを叩くネイティブハードウェアデコーダーを解放
                        },
                        videoConstraints: {
                            width: { min: 640, ideal: 1280, max: 1920 },
                            height: { min: 480, ideal: 720, max: 1080 },
                            focusMode: "continuous",
                            exposureMode: "continuous"
                        },
                        qrbox: (w, h) => {
                            // カメラ生映像の横幅の 70% を切り出しの基準幅に設定
                            const scanWidth = Math.max(Math.min(w * 0.7, 480), 200);
                            
                            // 縦幅を「1.44 : 0.5」の比率（＝横幅の 約34.72%）で完全に固定
                            const scanHeight = Math.round(scanWidth * 0.5 / 1.44);
                            
                            // 最低保障50px制限エラーを防御
                            return { 
                                width: Math.max(scanWidth, 50), 
                                height: Math.max(scanHeight, 50) 
                            };
                        }
                    },
                    onScanSuccess
                );
                
                container.classList.add("hidden");

            } catch (err) {
                console.error("Camera start failed:", err);
                container.innerHTML = `
                    <span class="text-4xl mb-3">⚠️</span>
                    <p class="font-bold mb-1 text-rose-400">カメラを起動できませんでした</p>
                    <p class="text-xs text-slate-300 px-4 mt-1">カメラの許可（きょか）を確認するか、テストボタン「⚡ ぴっ！」で遊んでね！</p>
                `;
            }
        }

        // 手ブレ対応型ファースト・ヒット優先インターバル管理
        let lastScanTime = 0;
        
        function onScanSuccess(code) {
            const now = Date.now();
            
            // 手ブレ環境では「2回連続一致」の障壁は高すぎます。ピントが合って読めた1フレーム（1発）を即座に採用します。
            // チャタリング（二重スキャン）は、ヒット後の絶対時間インターバル（1.8秒）のみで論理的に完全ガードします。
            if (now - lastScanTime < 1800) {
                return; // クールダウン期間中は無視
            }
            
            lastScanTime = now;
            addToCart(getProductFromBarcode(code));
        }

        function toggleCameraFacing() {
            isFrontCamera = !isFrontCamera;
            initScanner();
        }

        // テスト（モック）スキャンも75種の中から完全に抽選されます
        function triggerMockScan() {
            addToCart(dummyProducts[Math.floor(Math.random() * dummyProducts.length)]);
        }

        function addToCart(product) {
            new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:0.005,decay:0.1}}).toDestination().triggerAttackRelease("D6", "32n");
            document.getElementById("scanner-container").classList.add("ring-8", "ring-emerald-400");
            setTimeout(() => document.getElementById("scanner-container").classList.remove("ring-8", "ring-emerald-400"), 150);
            cart.push({ ...product, id: Date.now() + Math.random() });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById("cart-list");
            list.innerHTML = "";
            let total = 0;
            if (cart.length === 0) {
                list.innerHTML = `<li class="text-gray-400 text-center mt-16">おかいもの を はじめよう！</li>`;
            } else {
                cart.forEach(item => {
                    total += item.price;
                    const li = document.createElement("li");
                    li.className = "flex justify-between items-center bg-emerald-50 p-3 rounded-lg border border-emerald-100";
                    li.innerHTML = `
                        <span class="font-bold text-gray-800">${item.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-emerald-700">${item.price} 円</span>
                            <button onclick="removeItem(${item.id})" class="bg-rose-100 text-rose-700 text-xs px-2.5 py-1 rounded-lg font-bold hover:bg-rose-200 transition">とりけす</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }
            document.getElementById("total-count").innerText = cart.length + " 点";
            document.getElementById("total-price").innerText = total.toLocaleString();
            document.getElementById("checkout-btn").disabled = cart.length === 0;

            // 【UX・視覚的フィードバックの強化】
            // 商品が追加される（リストが更新される）たびに、一番下に追加された商品が確実に視界に入るよう
            // リストを自動的に最下部までスムーズにスクロール（せり上げ）させます。
            setTimeout(() => {
                list.scrollTop = list.scrollHeight;
            }, 50);
        }

        function removeItem(id) { 
            cart = cart.filter(i => i.id !== id); 
            renderCart(); 
        }
        
        function clearCart() { 
            cart = []; 
            renderCart(); 
        }

        // 実生活に即した賢い支払いロジック
        function getOptimalPayment(total) {
            const baseThousand = Math.ceil(total / 1000) * 1000;
            if (solvedCount < 1) return baseThousand === total ? baseThousand + 1000 : baseThousand;
            
            const rand = Math.random();
            if (rand < 0.5) {
                const hasu = total % 100; // 端数(一・十の位)
                if (hasu > 0 && (baseThousand + hasu) > total) {
                    return baseThousand + hasu; // 端数合わせ
                }
            }
            return (total < 4000 && Math.random() > 0.6) ? 5000 : (baseThousand === total ? baseThousand + 1000 : baseThousand);
        }

        // ==================== モーダルを開いた時にカメラ処理を「一時停止」する ====================
        function openPaymentModal() {
            isSolved = false; // フラグをリセット
            const actionsRow = document.getElementById("action-buttons-row");
            const showBtn = document.getElementById("show-receipt-btn");
            if (actionsRow) actionsRow.classList.remove("hidden");
            if (showBtn) showBtn.classList.add("hidden");

            totalAmount = cart.reduce((s, i) => s + i.price, 0);
            paidAmount = getOptimalPayment(totalAmount);
            changeAmount = paidAmount - totalAmount;
            document.getElementById("payment-info").innerText = `ごうけい ${totalAmount} 円。おさいふから ${paidAmount} 円 だしました！`;
            
            renderGrid();
            
            // モーダルを開く
            document.getElementById("payment-modal").classList.remove("hidden");
            
            // 【バグ回避の決定打】
            // DOMが隠れた状態でスキャンループが回るとライブラリがクラッシュ・リロードを引き起こすため、
            // モーダルオープン中はカメラの解析処理を明示的に一時停止(pause)します。
            if (html5QrScanner && html5QrScanner.getState() === 2) { // 2 = SCANNING
                try {
                    html5QrScanner.pause(true); // true を渡すと映像ストリームごとフリーズしてリソースを解放します
                } catch(e) {
                    console.warn("Scanner pause ignored.", e);
                }
            }

            setTimeout(resizeCanvas, 100);
        }

        // ==================== モーダルを閉じる時にカメラ処理を「再開」する ====================
        function closePaymentModal() { 
            document.getElementById("payment-modal").classList.add("hidden"); 
            
            // お会計をやめてスキャン画面に戻った際、フリーズしていたカメラを安全に再開(resume)させます。
            if (html5QrScanner && html5QrScanner.getState() === 3) { // 3 = PAUSED
                try {
                    html5QrScanner.resume();
                } catch(e) {
                    console.warn("Scanner resume failed.", e);
                }
            }
        }

        // レシート画面から次へ進む時もカメラを「再開」する
        function resetAppAndCloseSuccess() { 
            document.getElementById("success-modal").classList.add("hidden"); 
            cart = []; 
            renderCart(); 
            
            if (html5QrScanner && html5QrScanner.getState() === 3) { // 3 = PAUSED
                try {
                    html5QrScanner.resume();
                } catch(e) {
                    console.warn("Scanner resume failed.", e);
                }
            }
        }

        function renderGrid() {
            const cols = paidAmount >= 10000 ? 6 : 5;
            const container = document.getElementById("calculation-grid-container");
            container.innerHTML = `<div id="calculation-grid" class="grid grid-cols-${cols} border-t border-l border-sky-200"></div>`;
            const grid = container.firstChild;

            const paidStr = paidAmount.toString().padStart(cols, " ");
            const totalStr = totalAmount.toString().padStart(cols - 1, " ");

            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-24 bg-sky-50/30"></div>`; 
            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-16 text-3xl font-bold font-kyokasho text-slate-800">${paidStr[i] !== " " ? paidStr[i] : ""}</div>`; 
            grid.innerHTML += `<div class="graph-cell h-16 text-5xl font-black text-blue-600 font-kyokasho">－</div>`; 
            for(let i=0; i<cols-1; i++) grid.innerHTML += `<div class="graph-cell h-16 text-3xl font-bold font-kyokasho text-slate-800">${totalStr[i] !== " " ? totalStr[i] : ""}</div>`;
            grid.innerHTML += `<div class="col-span-${cols} h-1.5 bg-slate-800 my-1"></div>`; 
            for(let i=0; i<cols; i++) grid.innerHTML += `<div class="graph-cell h-16 bg-sky-50/10"></div>`; 

            const ansContainer = document.getElementById("answer-grid-container");
            ansContainer.innerHTML = `<div class="grid grid-cols-${cols} mt-2"><div class="flex items-center justify-center text-2xl font-black text-slate-400">=</div></div>`;
            const ansGrid = ansContainer.firstChild;
            if(cols===6) ansGrid.innerHTML += `<div class="m-1 h-16"></div>`;
            
            for(let i=3; i>=0; i--) ansGrid.innerHTML += `<div onclick="focusDigit(${i})" id="ans-box-${i}" class="m-1 h-16 bg-amber-50 border-2 border-slate-300 rounded-lg flex items-center justify-center text-3xl font-black text-amber-700 transition"></div>`;
            
            userAnswers = ["","","",""]; 
            focusDigit(0);
        }

        function focusDigit(idx) {
            currentFocusIndex = idx;
            for(let i=0; i<4; i++) {
                const b = document.getElementById(`ans-box-${i}`);
                if(b) b.className = (i===idx) ? "m-1 h-16 bg-yellow-100 border-4 border-amber-400 rounded-lg flex items-center justify-center text-3xl font-black text-amber-800 scale-105" : "m-1 h-16 bg-amber-50 border-2 border-slate-300 rounded-lg flex items-center justify-center text-3xl font-black text-amber-700";
            }
        }

        function pressKey(k) {
            if (isSolved) return; 
            
            if(typeof k === 'number') {
                userAnswers[currentFocusIndex] = k.toString();
                document.getElementById(`ans-box-${currentFocusIndex}`).innerText = k;
                if(currentFocusIndex < 3) focusDigit(currentFocusIndex + 1);
            } else if(k === 'BS') {
                userAnswers[currentFocusIndex] = ""; 
                document.getElementById(`ans-box-${currentFocusIndex}`).innerText = "";
                if(currentFocusIndex > 0) focusDigit(currentFocusIndex - 1);
            } else if(k === 'C') {
                userAnswers = ["","","",""]; 
                for(let i=0; i<4; i++) { 
                    const b = document.getElementById(`ans-box-${i}`); 
                    if(b) b.innerText = ""; 
                } 
                focusDigit(0);
            }
        }

        function playIncorrectChime() {
            const synthChime = new Tone.PolySynth().toDestination();
            synthChime.set({
                oscillator: { type: "sawtooth" }
            });
            const now = Tone.now();
            synthChime.triggerAttackRelease(["F#2", "G2"], "16n", now);
            synthChime.triggerAttackRelease(["F#2", "G2"], "6n", now + 0.12);
        }

        function checkAnswer() {
            if (isSolved) return;
            
            let s = ""; 
            for(let i=3; i>=0; i--) s += userAnswers[i] || (s===""?"":"0");
            
            if(parseInt(s || "0") === changeAmount) {
                isSolved = true;
                playCorrectChime();
                solvedCount++; 
                showReceiptButton();
            } else {
                playIncorrectChime();
            }
        }

        function showAnswerAutomatic() {
            if (isSolved) return;
            isSolved = true;
            
            const strChange = changeAmount.toString();
            userAnswers = ["", "", "", ""];
            
            for(let i=0; i<4; i++) {
                const b = document.getElementById(`ans-box-${i}`);
                if(b) b.innerText = "";
            }

            let strIdx = strChange.length - 1;
            for(let i=0; i<strChange.length; i++) {
                userAnswers[i] = strChange[strIdx - i];
                const b = document.getElementById(`ans-box-${i}`);
                if (b) {
                    b.innerText = userAnswers[i];
                }
            }
            
            currentFocusIndex = -1;
            for(let i=0; i<4; i++) {
                const b = document.getElementById(`ans-box-${i}`);
                if (b && !userAnswers[i]) {
                    b.className = "m-1 h-16 bg-amber-50 border-2 border-slate-300 rounded-lg flex items-center justify-center text-3xl font-black text-amber-700";
                }
            }

            playCorrectChime();
            showReceiptButton();
        }

        function showReceiptButton() {
            document.getElementById("action-buttons-row").classList.add("hidden");
            document.getElementById("show-receipt-btn").classList.remove("hidden");
            
            for(let i=0; i<4; i++) {
                const b = document.getElementById(`ans-box-${i}`);
                if (b && userAnswers[i]) {
                    b.classList.remove("bg-yellow-100", "border-amber-400", "text-amber-800", "bg-amber-50", "text-amber-700", "border-slate-300");
                    b.classList.add("bg-sky-100", "border-4", "border-sky-400", "text-sky-800", "scale-105"); 
                }
            }
        }

        function showReceipt() {
            document.getElementById("payment-modal").classList.add("hidden");
            
            const d = new Date(); 
            document.getElementById("receipt-date").innerText = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            document.getElementById("receipt-tx-no").innerText = Math.floor(Math.random() * 9000) + 1000;
            
            const list = document.getElementById("receipt-items-list"); 
            list.innerHTML = "";
            cart.forEach(i => {
                list.innerHTML += `
                    <div class="flex justify-between text-black font-bold">
                        <span>${i.name}</span>
                        <span>${i.price} 円</span>
                    </div>`;
            });
            
            document.getElementById("receipt-total-cost").innerText = totalAmount.toLocaleString();
            document.getElementById("receipt-paid-amount").innerText = paidAmount.toLocaleString();
            document.getElementById("receipt-change-amount").innerText = changeAmount.toLocaleString();
            
            document.getElementById("success-modal").classList.remove("hidden");
        }

        function playCorrectChime() {
            const synthChime = new Tone.PolySynth().toDestination();
            const now = Tone.now();
            synthChime.triggerAttackRelease("C5", "8n", now);
            synthChime.triggerAttackRelease("E5", "8n", now + 0.1);
            synthChime.triggerAttackRelease("G5", "8n", now + 0.2);
            synthChime.triggerAttackRelease("C6", "4n", now + 0.3);
        }

        function setupMemoCanvas() {
            canvas = document.getElementById("memo-canvas"); 
            ctx = canvas.getContext("2d");
            
            const draw = (e) => {
                if(!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                ctx.lineTo(x, y); 
                ctx.strokeStyle = penColor; 
                ctx.lineWidth = 4; 
                ctx.lineCap = "round"; 
                ctx.stroke();
            };
            
            canvas.onmousedown = (e) => { 
                isDrawing = true; 
                ctx.beginPath(); 
                const r = canvas.getBoundingClientRect(); 
                ctx.moveTo(e.clientX-r.left, e.clientY-r.top); 
            };
            canvas.onmousemove = draw;
            window.onmouseup = () => isDrawing = false;
            
            canvas.addEventListener("touchstart", (e) => { 
                isDrawing = true; 
                ctx.beginPath(); 
                const r = canvas.getBoundingClientRect(); 
                ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); 
                e.preventDefault(); 
            }, { passive: false });
            
            canvas.addEventListener("touchmove", (e) => { 
                draw(e); 
                e.preventDefault(); 
            }, { passive: false });

            canvas.addEventListener("touchend", () => {
                isDrawing = false;
            });
        }
        
        function resizeCanvas() { 
            const c = document.getElementById("canvas-container"); 
            if (c.offsetWidth > 0 && c.offsetHeight > 0) {
                canvas.width = c.offsetWidth; 
                canvas.height = c.offsetHeight; 
            } else {
                setTimeout(resizeCanvas, 50);
            }
        }
        
        function setPenColor(c) { 
            penColor = c; 
        }
        
        function clearCanvas() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }
    </script>
